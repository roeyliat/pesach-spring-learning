<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Heebo','Segoe UI',Arial,sans-serif;direction:rtl;background:#FFF8E7;min-height:100vh}
:root{
  --pur:#6D28D9;--purL:#EDE9FE;--purD:#4C1D95;
  --grn:#059669;--grnL:#D1FAE5;--grnD:#064E3B;
  --amb:#D97706;--ambL:#FEF3C7;--ambD:#78350F;
  --red:#DC2626;--redL:#FEE2E2;--redD:#7F1D1D;
  --blu:#2563EB;--bluL:#DBEAFE;--bluD:#1E3A8A;
  --tel:#0D9488;--telL:#CCFBF1;--telD:#134E4A;
  --ros:#E11D48;--rosL:#FFE4E6;--rosD:#881337;
  --gray:#6B7280;--grayL:#F9FAFB;--grayB:#E5E7EB;
}
.app{max-width:480px;margin:0 auto;padding:12px 14px 60px}
.hdr{text-align:center;padding:0 0 12px}
.hdr-icon{font-size:36px;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2))}
.hdr-title{font-size:24px;font-weight:900;color:#1E1B4B;letter-spacing:-0.5px}
.hdr-sub{font-size:13px;color:var(--gray);margin-top:2px}
.prog{display:flex;justify-content:center;gap:6px;margin-bottom:14px}
.prog-dot{display:flex;flex-direction:column;align-items:center;gap:3px}
.prog-circle{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;transition:all 0.4s cubic-bezier(.4,2,.4,1);border:3px solid var(--grayB);background:#F3F4F6;color:#9CA3AF}
.prog-circle.done{background:#D1FAE5;border-color:var(--grn);color:var(--grnD)}
.prog-label{font-size:11px;font-weight:700;color:#9CA3AF}
.wallet{background:#fff;border-radius:20px;border:3px solid #FFD700;padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 16px rgba(255,200,0,0.2)}
.wallet-icon{font-size:34px}
.wallet-info{flex:1}
.wallet-label{font-size:12px;color:#888;font-weight:700}
.wallet-amount{font-size:30px;font-weight:900;color:var(--grn);line-height:1.1}
.wallet-progress{height:12px;background:#E5E7EB;border-radius:6px;margin-top:5px;overflow:hidden}
.wallet-fill{height:100%;background:linear-gradient(90deg,#4ADE80,#059669);border-radius:6px;transition:width 0.5s cubic-bezier(.4,2,.4,1)}
.wallet-goal{background:var(--grnL);border:2px solid #86EFAC;border-radius:16px;padding:6px 14px;font-size:15px;font-weight:700;color:var(--grn);white-space:nowrap}
.card{background:#fff;border-radius:24px;border:3px solid var(--grayB);padding:20px 18px;box-shadow:0 8px 32px rgba(0,0,0,0.09);animation:popIn 0.35s cubic-bezier(.4,2,.4,1)}
.badge{display:inline-flex;align-items:center;gap:8px;border-radius:20px;padding:4px 14px;font-size:14px;font-weight:700;margin-bottom:12px;border:2px solid}
.badge-num{border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff}
.tip{border-radius:14px;padding:12px 16px;font-size:16px;font-weight:700;text-align:center;margin:10px 0;animation:popIn 0.3s cubic-bezier(.4,2,.4,1)}
.tip-good{background:#F0FDF4;border:2.5px solid #4ADE80;color:#14532D}
.tip-warn{background:#FFFBEB;border:2.5px solid #FCD34D;color:#92400E}
.big-btn{display:block;width:100%;padding:18px 16px;border-radius:20px;border:none;color:#fff;font-size:20px;font-weight:900;cursor:pointer;font-family:inherit;transition:transform 0.1s;margin-top:8px}
.big-btn:active{transform:translateY(4px)}
.big-btn:disabled{background:#D1D5DB!important;box-shadow:none!important;cursor:not-allowed}
/* MONEY IMAGES */
.money-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.money-img{border-radius:50%;transition:all 0.2s;object-fit:contain;display:block}
.money-img.bill{border-radius:8px}
.money-wrap{background:transparent}
.money-img.selected{filter:drop-shadow(0 0 8px #7C3AED) brightness(1.1);transform:scale(1.1)}
.money-img.matched{filter:drop-shadow(0 0 6px #22C55E) brightness(1.05);opacity:0.7}
.money-img.glow{filter:drop-shadow(0 0 10px gold) brightness(1.15)}
.money-label{font-size:13px;font-weight:700;color:#374151;text-align:center}
/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 32px 1fr;gap:10px;align-items:center}
.match-item{min-height:90px;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;cursor:pointer;transition:all 0.2s;border:3px solid var(--grayB);background:#F9FAFB;gap:4px}
.match-item.selected{border-color:var(--pur);background:var(--purL);transform:scale(1.06)}
.match-item.matched{border-color:#4ADE80;background:var(--grnL);cursor:default}
.val-btn{min-height:72px;border-radius:16px;font-size:22px;font-weight:900;cursor:pointer;font-family:inherit;transition:all 0.2s;border:3px solid var(--grayB);background:#F9FAFB;color:var(--purD);width:100%;padding:8px}
.val-btn.selected{border-color:var(--pur);background:var(--purL)}
.val-btn.matched{border-color:#4ADE80;background:var(--grnL);color:var(--grn);cursor:default}
.compare-row{background:var(--purL);border-radius:14px;padding:12px;margin-top:14px}
/* STAGE 2 */
.tab-row{display:flex;gap:10px;margin-bottom:16px}
.tab-btn{flex:1;padding:13px 8px;border-radius:14px;border:3px solid var(--grayB);background:#fff;color:var(--gray);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s}
.tab-btn.active{border-color:var(--grn);background:var(--grnL);color:var(--grnD)}
.pitcher{font-size:96px;cursor:pointer;display:inline-block;user-select:none;transition:transform 0.15s cubic-bezier(.4,2,.4,1);filter:drop-shadow(0 6px 10px rgba(0,0,0,0.2))}
.pitcher.pressed{transform:scale(0.82) rotate(-15deg)}
.cups-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
.bottle-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:10px 0}
.bottle{font-size:32px;cursor:pointer;transition:all 0.25s cubic-bezier(.4,2,.4,1);user-select:none}
.bottle.done{opacity:0.15;transform:scale(0.65);cursor:default}
/* STAGE 3 */
.product-row{border-radius:16px;border:2.5px solid #FCD34D;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:all 0.3s;background:var(--ambL)}
.product-row.bought{border-color:#4ADE80;background:var(--grnL)}
.buy-btn{padding:13px 18px;border-radius:14px;border:none;color:#fff;font-size:18px;font-weight:900;cursor:pointer;font-family:inherit;transition:all 0.2s}
.bulk-box{background:var(--bluL);border-radius:18px;border:2.5px solid #93C5FD;padding:16px;margin:8px 0}
.bulk-choice{padding:12px;border-radius:14px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;transition:all 0.2s;border:2px solid}
.tempt-box{background:var(--rosL);border-radius:18px;border:2.5px solid #FCA5A5;padding:16px;margin:8px 0}
/* STAGE 4 */
.social-box{background:var(--telL);border-radius:16px;border:2.5px solid #5EEAD4;padding:16px;margin-bottom:14px}
.social-btn{padding:14px 18px;border-radius:14px;border:2px solid var(--tel);background:#fff;font-size:16px;font-weight:700;color:var(--telD);cursor:pointer;font-family:inherit;transition:transform 0.1s}
.social-btn:active{transform:scale(0.95)}
.surprise-box{background:var(--ambL);border-radius:16px;border:2.5px solid #FCD34D;padding:16px;margin-bottom:14px;animation:popIn 0.4s cubic-bezier(.4,2,.4,1)}
.receipt{background:#F9FAFB;border-radius:14px;padding:12px 16px;margin-bottom:14px;border:2px solid var(--grayB)}
.receipt-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:16px}
.receipt-total{display:flex;justify-content:space-between;padding-top:10px;font-size:22px;font-weight:900;color:var(--bluD)}
.pay-area{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:14px 0}
.pay-item{cursor:pointer;transition:transform 0.15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.pay-item:hover .money-img{filter:drop-shadow(0 0 8px #FFD700) brightness(1.12);transform:scale(1.1)}
/* STAGE 5 */
.bag-view{background:#F9FAFB;border-radius:16px;border:2px solid var(--grayB);padding:12px;margin-bottom:14px;min-height:80px}
.pack-chip{border-radius:10px;padding:6px 12px;font-size:16px;border:1.5px solid;display:inline-flex;align-items:center;gap:4px;margin:3px}
.pack-btn{padding:14px 18px;border-radius:14px;border:2px solid;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;margin:4px}
.pack-btn:active{transform:scale(0.95)}
.celebrate-icon{font-size:60px;animation:bounce 0.6s infinite alternate;display:inline-block}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-14px)}}
@keyframes popIn{from{opacity:0;transform:scale(0.85) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes coinDrop{from{opacity:0;transform:translateY(-20px) scale(0.6)}to{opacity:1;transform:translateY(0) scale(1)}}
button:focus-visible,[role=button]:focus-visible{outline:4px solid var(--pur);outline-offset:3px;border-radius:8px}
</style>
</head>

const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function pick(arr,n){const a=[...arr],r=[];for(let i=0;i<n&&a.length;i++){const x=rnd(0,a.length-1);r.push(a.splice(x,1)[0]);}return r;}
const shuffle=a=>[...a].sort(()=>Math.random()-0.5);
const fmt=v=>Number.isInteger(v)?String(v):v.toFixed(2);
function makeChange(amount){
  const r=[];let rem=Math.round(amount*100);
  ALL_MONEY.forEach(m=>{const c=Math.round(m.v*100);while(rem>=c){r.push(m);rem-=c;}});
  return r;
}
function makeGame(){
  const goal=pick(GOALS,1)[0];
  const diff=pick([1,2,3],1)[0];
  const listSize=diff===1?2:diff===2?3:4;
  const list=pick(PRODUCTS,Math.min(listSize,4));
  const tempt=Math.random()>0.4?pick(TEMPTS,1)[0]:null;
  const bulk=Math.random()>0.5?pick(BULKS,1)[0]:null;
  const moneyPool=[...COINS.slice(0,5),...BILLS];
  const chosen=pick(moneyPool,3);
  const vals=shuffle(chosen.map(c=>({v:c.v,l:c.l})));
  return{stage:1,wallet:0,goal,diff,
    mc:chosen,mv:vals,mm:[],msi:null,msv:null,
    cups:0,bottles:Array(20).fill(false),bc:0,tab:"lemon",

    sd:false,scc:0,su:false,change:null,cc:[],col:false,packed:[],
    tip:null,tt:"good"};
}

// DOM HELPERS
// ══════════════════════════════════
function el(tag,cls,style,children,attrs){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(style)Object.assign(e.style,style);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="children")return;
    if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(attrs&&attrs.children){
    const ac=Array.isArray(attrs.children)?attrs.children:[attrs.children];
    ac.filter(Boolean).forEach(c2=>e.appendChild(typeof c2==="string"?document.createTextNode(c2):c2));
  }
  const ch=children==null?[]:Array.isArray(children)?children:[children];
  ch.filter(Boolean).forEach(c=>
    e.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return e;
}
const div=(cls,style,ch,at)=>el("div",cls,style,ch,at);
const span=(cls,style,ch)=>el("span",cls,style,ch);
const btn=(cls,style,ch,at)=>el("button",cls,style,ch,at);
const img=(src,cls,style)=>el("img",cls,style,[],{src});

// Real money image element
function moneyImg(def,size,extra){
  const isCoin=def.isCoin;
  const imgEl=img(def.img,"money-img"+(isCoin?"":" bill")+(extra?" "+extra:""),
    {width:size+"px",height:isCoin?size+"px":"auto",objectFit:"contain"});
  return imgEl;
}
function moneyWrap(def,sizeComp,clickFn,extra){
  const size=def.isCoin?sizeComp:null;
  const w=div("money-wrap",{cursor:clickFn?"pointer":"default"},[
    moneyImg(def,size||60,extra),
    div("money-label",{},[def.l]),
  ],clickFn?{onClick:clickFn}:{});
  // Fix: set text manually
  w.querySelector(".money-label").textContent=def.l;
  return w;
}

function tipBox(msg,type){
  if(!msg)return null;
  return div("tip tip-"+type,{},[msg]);
}
function bigBtn(label,color,onClick,disabled){
  const b=btn("big-btn",{background:disabled?"#D1D5DB":color,boxShadow:disabled?"none":`0 5px 0 ${color}88`},[label],
    {...(disabled?{disabled:""}:{}),onClick});
  return b;
}

// ══════════════════════════════════
// STAGE 1 — MATCH (real images)
// ══════════════════════════════════
function renderStage1(){
  const {mc:chosen,mv:vals,mm:matched,msi:selItem,msv:selVal}=G;

  function selectItem(i){
    if(matched.includes(i))return;
    if(selVal!==null)tryMatch(i,selVal);
    else upd({msi:selItem===i?null:i,msv:null});
  }
  function selectVal(vi){
    if(isVU(vi))return;
    if(selItem!==null)tryMatch(selItem,vi);
    else upd({msi:null,msv:selVal===vi?null:vi});
  }
  function isVU(vi){return vals[vi]._u;}
  function tryMatch(ii,vi){
    const item=chosen[ii],val=vals[vi];
    if(Math.abs(item.v-val.v)<0.01){
      const nm=[...matched,ii];
      const nw=parseFloat((G.wallet+item.v).toFixed(2));
      const nv=vals.map((v,j)=>j===vi?{...v,_u:true}:v);
      const updata={mm:nm,msi:null,msv:null,wallet:nw,mv:nv};
      if(nm.length===chosen.length){upd(updata);setTimeout(()=>upd({stage:2,tip:null}),700);}
      else{upd(updata);setTip("✨ נכון! המשיכו!","good");}
    } else {
      upd({msi:null,msv:null});
      setTip("💡 לא נורא — נסו שוב!","warn");
    }
  }

  // LEFT column: value buttons
  const leftCol=div(null,{display:"flex",flexDirection:"column",gap:"10px"},
    vals.map((v,vi)=>{
      const used=isVU(vi);
      return btn("val-btn"+(used?" matched":selVal===vi?" selected":""),{},
        [used?"✓":v.l],
        {onClick:()=>!used&&selectVal(vi),...(used?{disabled:""}:{})});
    })
  );
  const arrow=div(null,{textAlign:"center",fontSize:"24px",color:"var(--grayB)"},["←"]);
  // RIGHT column: real money images
  const rightCol=div(null,{display:"flex",flexDirection:"column",gap:"10px"},
    chosen.map((item,i)=>{
      const isM=matched.includes(i),isSel=selItem===i;
      const mw=moneyWrap(item,item.isCoin?70:null,null,
        isM?"matched":isSel?"selected":"");
      const wrap=div("match-item"+(isM?" matched":isSel?" selected":""),
        {transform:isSel?"scale(1.06)":"scale(1)"},
        [mw,isM?span(null,{fontSize:"20px"},["✓"]):null]);
      wrap.addEventListener("click",()=>selectItem(i));
      return wrap;
    })
  );
  const grid=div("match-grid",{},[leftCol,arrow,rightCol]);

  // Compare strip — all coins sorted by size
  const coinsSorted=[...COINS.slice(0,5)].sort((a,b)=>b.v-a.v);
  const compareRow=div("compare-row",{},[
    div(null,{fontSize:"13px",color:"var(--purD)",fontWeight:"700",marginBottom:"8px",textAlign:"center"},
      ["↕ השוואת גדלים וצבעים"]),
    div(null,{display:"flex",gap:"12px",justifyContent:"center",flexWrap:"wrap",alignItems:"flex-end"},
      coinsSorted.map((c,i)=>div(null,{textAlign:"center"},[
        moneyImg(c,38+i*6,""),
        div(null,{fontSize:"11px",marginTop:"3px",color:"var(--purD)",fontWeight:"700"},[c.l])
      ]))
    )
  ]);

  return div(null,{},[
    badge(1,"זיהוי כסף","#6D28D9"),
    div(null,{fontSize:"22px",fontWeight:"900",color:"var(--purD)",marginBottom:"4px"},["🎯 התאם כל מטבע לערך שלו!"]),
    div(null,{fontSize:"15px",color:"var(--gray)",marginBottom:"16px"},["לחץ על מטבע ואז על הערך המתאים"]),
    grid,compareRow,
    tipBox(G.tip,G.tt),
    div(null,{textAlign:"center",marginTop:"10px",fontSize:"14px",color:"var(--gray)"},[matched.length+" מתוך "+chosen.length+" ✦"])
  ]);
}

// ══════════════════════════════════
// STAGE 2 — EARN
// ══════════════════════════════════
function renderStage2(){
  const pct=Math.min(100,(G.wallet/G.goal)*100);
  function onCup(pitEl){
    pitEl.classList.add("pressed");
    setTimeout(()=>pitEl.classList.remove("pressed"),200);
    const nw=parseFloat((G.wallet+5).toFixed(2));
    upd({wallet:nw,cups:G.cups+1});
    if(nw>=G.goal)setTimeout(()=>setTip("🎉 הגעת ליעד!","good",9999),200);
  }
  function onBottle(i){
    if(G.bottles[i])return;
    const nb=[...G.bottles];nb[i]=true;
    const nc=G.bc+1;
    let nw=G.wallet;
    if(nc%10===0){nw=parseFloat((G.wallet+1).toFixed(2));setTip("🪙 +1 ₪!","good",900);}
    upd({bottles:nb.every(x=>x)?Array(20).fill(false):nb,bc:nc,wallet:nw});
    if(nw>=G.goal)setTimeout(()=>setTip("🎉 הגעת ליעד!","good",9999),200);
  }
  const pb=div(null,{background:"#E5E7EB",borderRadius:"12px",height:"22px",marginBottom:"16px",overflow:"hidden",border:"2px solid var(--grayB)"},[
    div(null,{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#4ADE80,#059669)",borderRadius:"12px",transition:"width 0.5s"},
      pct>15?[div(null,{fontSize:"12px",fontWeight:"900",color:"#fff",display:"flex",alignItems:"center",height:"100%",justifyContent:"flex-end",paddingRight:"8px"},[fmt(G.wallet)+" ₪"])]:[]
    )
  ]);
  const tabs=div("tab-row",{},[
    btn("tab-btn"+(G.tab==="lemon"?" active":""),{},{},["🍋 דוכן לימונדה"],{onClick:()=>upd({tab:"lemon"})}),
    btn("tab-btn"+(G.tab==="recycle"?" active":""),{},{},["♻️ מיחזור"],{onClick:()=>upd({tab:"recycle"})}),
  ]);
  // Fix tab buttons
  const [tabL,tabR]=tabs.children;
  tabL.textContent="🍋 דוכן לימונדה";
  tabR.textContent="♻️ מיחזור";
  tabL.addEventListener("click",()=>upd({tab:"lemon"}));
  tabR.addEventListener("click",()=>upd({tab:"recycle"}));

  let content;
  if(G.tab==="lemon"){
    const pit=div("pitcher",{},["🍋"]);
    pit.addEventListener("click",()=>onCup(pit));
    pit.addEventListener("keydown",e=>e.key==="Enter"&&onCup(pit));
    pit.setAttribute("role","button");pit.setAttribute("tabindex","0");
    const cups=Array(10).fill(0).map((_,i)=>
      span(null,{fontSize:"30px",transition:"opacity 0.3s",opacity:i<G.cups%10||((G.cups%10)===0&&G.cups>0&&i<10)?1:0.2},["🥤"])
    );
    content=div(null,{textAlign:"center"},[
      div(null,{fontSize:"14px",color:"var(--gray)",marginBottom:"10px"},["לחץ על הקנקן — כל כוס = 5 ₪"]),
      pit,
      div("cups-row",{},cups),
      div(null,{fontSize:"17px",fontWeight:"700",color:"var(--grnD)"},[G.cups+" כוסות = "+G.cups*5+" ₪"]),
    ]);
  } else {
    const bots=G.bottles.map((r,i)=>{
      const b=span("bottle"+(r?" done":""),{},["🍶"]);
      b.setAttribute("role","button");b.setAttribute("tabindex",r?"-1":"0");
      b.addEventListener("click",()=>onBottle(i));
      b.addEventListener("keydown",e=>e.key==="Enter"&&onBottle(i));
      return b;
    });
    content=div(null,{},[
      div(null,{fontSize:"14px",color:"var(--gray)",marginBottom:"10px",textAlign:"center"},["לחץ על בקבוק — 10 בקבוקים = 1 ₪"]),
      div("bottle-grid",{},bots),
      div(null,{textAlign:"center",fontSize:"16px",fontWeight:"700",color:"var(--grnD)"},[G.bc+" בקבוקים = "+Math.floor(G.bc/10)+" ₪"]),
    ]);
  }
  const doneBtn=G.wallet>=G.goal?bigBtn("🛒 לחנות!","#059669",()=>upd({stage:3,tip:null})):null;
  return div(null,{},[badge(2,"צוברים כסף","#059669"),
    div(null,{fontSize:"22px",fontWeight:"900",color:"var(--grnD)",marginBottom:"6px"},["💪 צברו "+G.goal+" ₪!"]),
    pb,renderTabs(),content,tipBox(G.tip,G.tt),doneBtn]);
}
function renderTabs(){
  const tabs=div("tab-row",{});
  const tl=btn("tab-btn"+(G.tab==="lemon"?" active":""),{},["🍋 דוכן לימונדה"],{onClick:()=>upd({tab:"lemon"})});
  const tr=btn("tab-btn"+(G.tab==="recycle"?" active":""),{},["♻️ מיחזור"],{onClick:()=>upd({tab:"recycle"})});
  tabs.appendChild(tl);tabs.appendChild(tr);
  return tabs;
}

// STAGE 3 — STORE
// ══════════════════════════════════
function renderStage3(){
  const ct=G.cart.reduce((a,b)=>a+b.paid,0);
  const rem=parseFloat((G.wallet-ct).toFixed(2));
  function buyItem(item){
    if(rem<item.p){setTip("💡 חסר לנו עוד קצת כסף!","warn");return;}
    upd({cart:[...G.cart,{...item,paid:item.p}],tip:null});
  }
  function doBulk(type){
    const d=G.bulk,price=type==="single"?d.sp:d.mp;
    const cr=parseFloat((G.wallet-G.cart.reduce((a,b)=>a+b.paid,0)).toFixed(2));
    if(cr<price){setTip("💡 חסר כסף","warn");return;}
    const entry={id:"bulk_"+d.e,n:type==="single"?d.s:d.m,e:d.e,paid:price,w:"light"};
    upd({cart:[...G.cart,entry],bk:true,tip:type==="multi"?"🤑 בחרת את הצעת הערך!":"✓"});
  }
  function doTempt(yes){
    if(!yes){upd({tempt:null});setTip("✋ כל הכבוד — רק מה שצריך!","good");return;}
    const t=G.tempt,cr=parseFloat((G.wallet-G.cart.reduce((a,b)=>a+b.paid,0)).toFixed(2));
    if(cr<t.p){setTip("💡 אין מספיק כסף","warn");return;}
    upd({cart:[...G.cart,{...t,paid:t.p}],tempt:null});setTip("😋 ממם!","good");
  }

  const budBar=div(null,{display:"flex",justifyContent:"space-between",alignItems:"center",
    background:"var(--grnL)",borderRadius:"12px",padding:"8px 14px",marginBottom:"16px",border:"2px solid #86EFAC"},[
    span(null,{fontSize:"15px",fontWeight:"700",color:"var(--grnD)"},["תקציב שלך"]),
    span(null,{fontSize:"22px",fontWeight:"900",color:"var(--grn)"},[fmt(rem)+" ₪"]),
  ]);
  const items=G.list.map(item=>{
    const inCart=G.cart.some(c=>c.id===item.id);
    const canBuy=rem>=item.p&&!inCart;
    const b=btn("buy-btn",{background:inCart?"#16A34A":canBuy?"var(--blu)":"#9CA3AF"},
      [inCart?"✓":"קנה"],
      {onClick:()=>buyItem(item),...(inCart||!canBuy?{disabled:""}:{})});
    return div("product-row"+(inCart?" bought":""),{},[
      span(null,{fontSize:"44px"},[item.e]),
      div(null,{flex:"1"},[
        div(null,{fontSize:"18px",fontWeight:"700",color:"#1F2937"},[item.n]),
        div(null,{fontSize:"20px",fontWeight:"900",color:"var(--grn)"},[item.p+" ₪"]),
      ]),b
    ]);
  });
  let bulkBox=null;
  if(G.bulk&&!G.bk){
    const d=G.bulk;
    bulkBox=div("bulk-box",{},[
      div(null,{fontSize:"16px",fontWeight:"900",color:"var(--bluD)",marginBottom:"10px"},["🧠 הקונה החכם — מה כדאי?"]),
      div(null,{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"},[
        btn("bulk-choice",{borderColor:"var(--blu)",background:"#fff",color:"var(--bluD)"},
          [d.e+" "+d.s,div(null,{fontSize:"20px",fontWeight:"900",color:"var(--grn)"},[d.sp+" ₪"])],
          {onClick:()=>doBulk("single")}),
        btn("bulk-choice",{borderColor:"var(--grn)",background:"var(--grnL)",color:"var(--grnD)"},
          [d.e.repeat(Math.min(d.mq,3))+" "+d.m,
           div(null,{fontSize:"20px",fontWeight:"900",color:"var(--grn)"},[d.mp+" ₪"]),
           div(null,{fontSize:"12px",color:"var(--grn)",fontWeight:"700"},["(חיסכון!)"])],
          {onClick:()=>doBulk("multi")}),
      ]),
      div(null,{marginTop:"8px",textAlign:"center",fontSize:"20px"},
        ["🪙".repeat(Math.min(d.sp,8))+" VS "+"🪙".repeat(Math.min(d.mp,10))]),
    ]);
  }
  let temptBox=null;
  if(G.tempt){
    const t=G.tempt;
    temptBox=div("tempt-box",{},[
      div(null,{fontSize:"16px",fontWeight:"900",color:"var(--rosD)",marginBottom:"8px"},[t.e+" "+t.n+" ב-"+t.p+" ₪ — לא ברשימה!"]),
      div(null,{fontSize:"14px",color:"#374151",marginBottom:"10px"},["יש לך "+fmt(rem)+" ₪. מה תחליט?"]),
      div(null,{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"},[
        btn(null,{padding:"14px",borderRadius:"14px",border:"none",background:rem>=t.p?"var(--amb)":"#D1D5DB",color:"#fff",fontSize:"16px",fontWeight:"900",cursor:"pointer",fontFamily:"inherit"},
          [t.e+" כן!"],{onClick:()=>doTempt(true),...(rem<t.p?{disabled:""}:{})}),
        btn(null,{padding:"14px",borderRadius:"14px",border:"2.5px solid var(--grn)",background:"var(--grnL)",color:"var(--grnD)",fontSize:"16px",fontWeight:"900",cursor:"pointer",fontFamily:"inherit"},
          ["✋ לא"],{onClick:()=>doTempt(false)}),
      ]),
    ]);
  }
  return div(null,{},[badge(3,"מכולת חכמה","#D97706"),
    div(null,{fontSize:"22px",fontWeight:"900",color:"var(--ambD)",marginBottom:"4px"},["🛒 זמן לקניות!"]),
    budBar,...items,bulkBox,temptBox,tipBox(G.tip,G.tt),
    bigBtn("➡ לקופה",G.cart.length?"var(--grn)":"#9CA3AF",()=>{
      if(!G.cart.length){setTip("🛍️ קנה לפחות פריט אחד!","warn");return;}
      upd({stage:4,tip:null});
    },!G.cart.length)]);
}

// STAGE 4 — CHECKOUT (real money images)
// ══════════════════════════════════
function renderStage4(){
  const bt=G.cart.reduce((a,b)=>a+b.paid,0);
  const total=bt+(G.su?1:0);
  function doSurOk(){upd({su:true});}
  function doPay(amount){
    if(amount<total){setTip("💡 הסכום קטן מדי!","warn");return;}
    const change=parseFloat((amount-total).toFixed(2));
    upd({change,cc:makeChange(change),tip:null});
  }
  function doCollect(){upd({wallet:parseFloat((G.wallet+G.change).toFixed(2)),col:true,stage:5,tip:null});}

  let socialBox=null;

    const phrases=SOCIAL.map(s=>btn("social-btn",{},[s],{onClick:()=>upd({scc:G.scc+1})}));
    const doneBtn=G.scc>0?btn(null,{marginTop:"10px",padding:"12px",width:"100%",borderRadius:"12px",background:"var(--tel)",color:"#fff",border:"none",fontSize:"16px",fontWeight:"900",cursor:"pointer",fontFamily:"inherit"},
      ["✓ סיימתי לדבר עם הקופאית"],{onClick:()=>upd({sd:true})}):null;

    ]);

      div(null,{fontSize:"15px",color:"#374151",marginBottom:"10px"},['המחיר עלה ב-1 ₪. הסכום החדש: ',span(null,{color:"var(--red)",fontWeight:"900"},[fmt(total)+" ₪"])]),

    payArea=div(null,{},[
      div(null,{fontSize:"16px",fontWeight:"700",color:"#374151",marginBottom:"12px",textAlign:"center"},["בחר שטר או מטבע לתשלום:"]),

        w.addEventListener("click",()=>doPay(m.v));

// ══════════════════════════════════
// STAGE 5 — PACK
// ══════════════════════════════════
function renderStage5(){
  const cart=G.cart.map(c=>{
    const src=PRODUCTS.find(p=>p.id===c.id)||TEMPTS.find(p=>p.id===c.id)||c;
    return{...c,e:src.e||c.e,w:src.w||c.w||"light"};
  });
  const remaining=cart.filter(c=>!G.packed.includes(c.id));
  const heavy=remaining.filter(c=>c.w==="heavy"),light=remaining.filter(c=>c.w==="light");
  const isDone=G.packed.length===cart.length;
  function tryPack(item){
    if(item.w==="light"&&heavy.length>0){setTip("💡 קודם שים כבדים בתחתית","warn");return;}
    const np=[...G.packed,item.id];upd({packed:np});
    if(np.length===cart.length)setTip("🎉 מושלם! סידרת את השקית!","good",99999);
    else if(item.w==="heavy")setTip("👍 כבדים בתחתית!","good",900);
  }
  const bagView=div("bag-view",{},[
    div(null,{fontSize:"13px",color:"var(--gray)",marginBottom:"8px",fontWeight:"600"},["🛍️ בשקית:"]),
    div(null,{display:"flex",flexWrap:"wrap"},
      G.packed.length===0?[span(null,{color:"var(--gray)",fontSize:"14px"},["ריק..."])]:
      G.packed.map(id=>{
        const item=cart.find(c=>c.id===id);
        return span("pack-chip",{background:item.w==="heavy"?"var(--ambL)":"var(--grnL)",
          borderColor:item.w==="heavy"?"#FCD34D":"#86EFAC",
          color:item.w==="heavy"?"var(--ambD)":"var(--grnD)"},[item.e+" "+(item.n||"")]);
      })
    ),
  ]);
  const hSec=heavy.length>0?div(null,{marginBottom:"12px"},[
    div(null,{fontSize:"14px",fontWeight:"700",color:"var(--ambD)",marginBottom:"6px"},["⬇ כבדים (שים קודם):"]),
    div(null,{display:"flex",flexWrap:"wrap"},heavy.map(item=>
      btn("pack-btn",{borderColor:"var(--amb)",background:"var(--ambL)",color:"var(--ambD)"},[item.e+" "+item.n],{onClick:()=>tryPack(item)})
    )),
  ]):null;
  const lSec=light.length>0?div(null,{marginBottom:"12px"},[
    div(null,{fontSize:"14px",fontWeight:"700",color:"var(--grnD)",marginBottom:"6px"},["⬆ קלים/שבירים:"]),
    div(null,{display:"flex",flexWrap:"wrap"},light.map(item=>{
      const locked=heavy.length>0;
      return btn("pack-btn",{borderColor:locked?"var(--grayB)":"var(--grn)",
        background:locked?"#F3F4F6":"var(--grnL)",color:locked?"var(--gray)":"var(--grnD)",
        opacity:locked?0.4:1},[item.e+" "+item.n],
        {onClick:()=>!locked&&tryPack(item),...(locked?{disabled:""}:{})});
    })),
  ]):null;
  const doneSec=isDone?div(null,{animation:"popIn 0.4s cubic-bezier(.4,2,.4,1)"},[
    div(null,{background:"var(--grnL)",borderRadius:"16px",border:"2px solid #86EFAC",padding:"16px",textAlign:"center",marginBottom:"12px"},[
      div(null,{},[ div(null,{textAlign:"center"},[span("celebrate-icon",{},["🌟"])]) ]),
      div(null,{fontSize:"20px",fontWeight:"900",color:"var(--grnD)"},["כל הכבוד — סיימת!"]),
      div(null,{fontSize:"15px",color:"var(--grn)",marginTop:"6px",fontWeight:"700"},["נשאר לך "+fmt(G.wallet)+" ₪ לטיול הבא!"]),
    ]),
    bigBtn("🎮 טיול קניות נוסף!","#6D28D9",()=>{G=makeGame();render();}),
  ]):null;
  return div(null,{},[badge(5,"סדר שקית","#0D9488"),
    div(null,{fontSize:"22px",fontWeight:"900",color:"var(--telD)",marginBottom:"8px"},["🛍️ סדר את השקית!"]),
    div(null,{background:"var(--telL)",borderRadius:"12px",padding:"10px",marginBottom:"14px",fontSize:"15px",color:"var(--telD)",fontWeight:"600"},["כבדים בתחתית 🧱 → קלים למעלה 🌸"]),
    bagView,!isDone?div(null,{},[hSec,lSec]):null,tipBox(G.tip,G.tt),doneSec]);
}

// ══════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const sm=STAGE_META[G.stage-1];
  const hdr=div("hdr",{},[
    div("hdr-icon",{},["🛒"]),
    div("hdr-title",{},["הדרך לעצמאות"]),
    div("hdr-sub",{},[
      "רמה "+(G.diff===1?"🌱 קל":G.diff===2?"🌿 בינוני":"🌳 מאתגר")+" · יעד: "+G.goal+" ₪"
    ]),
  ]);
  let sc;
  if(G.stage===1)sc=renderStage1();
  else if(G.stage===2)sc=renderStage2();
  else if(G.stage===3)sc=renderStage3();
  else if(G.stage===4)sc=renderStage4();
  else sc=renderStage5();
  const card=div("card",{borderColor:sm.c},[sc]);
  app.appendChild(hdr);
  app.appendChild(progressBar());
  app.appendChild(walletBar());
  app.appendChild(card);
}
render();
</script>
</body>
</html>
