<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Heebo',Arial,sans-serif;direction:rtl}
body{background:#0a1a0a;color:#fff;padding:12px}
h2{font-size:20px;color:#4adf7a;margin-bottom:8px}
.info{background:#1a2a1a;border:2px solid #2a5a2a;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#aad4aa;line-height:1.7}
.info b{color:#4adf7a}
.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.toolbar button{padding:8px 16px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-clear{background:#7f1d1d;color:#fff}
.btn-undo{background:#1a3a6a;color:#fff}
.btn-gen{background:#059669;color:#fff;font-size:15px;padding:10px 20px}
.counter{font-size:16px;font-weight:700;color:#f5c842}
.scene-wrap{position:relative;border:3px solid #2a5a2a;border-radius:8px;overflow:hidden;display:inline-block;max-width:100%;cursor:crosshair;touch-action:none;user-select:none}
.scene-wrap img{display:block;width:100%;height:auto;pointer-events:none}
.dot{position:absolute;transform:translate(-50%,-50%);border-radius:50%;background:rgba(255,220,0,0.8);border:3px solid #ff0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#000;transition:background 0.15s;z-index:10}
.dot:hover{background:rgba(255,60,60,0.85)}
.output-wrap{margin-top:12px;display:none}
.output-wrap h3{font-size:15px;color:#4adf7a;margin-bottom:6px}
.output{background:#050f05;border:2px solid #1a3a1a;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#4adf7a;white-space:pre-wrap;word-break:break-all;max-height:250px;overflow-y:auto}
.copy-btn{margin-top:8px;padding:8px 18px;border-radius:8px;border:none;background:#1a5a9a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.tip{font-size:12px;color:#6a9a6a;margin-top:6px}
</style>
</head>

<h2>🎯 כלי סימון בקבוקים</h2>
<div class="info">
<b>שלב 1:</b> לחץ על כל בקבוק בתמונה — מופיע עיגול עם מספר<br>
<b>שלב 2:</b> לחץ על עיגול כדי למחוק אותו (אם טעית)<br>
<b>שלב 3:</b> לחץ "הפק קוד" וקבל את הנתונים להדבקה במשחק
</div>

<div class="output-wrap" id="out-wrap">
  <h3>קוד לשימוש במשחק:</h3>
  <div class="output" id="output"></div>
  <button class="copy-btn" onclick="copyCode()">📋 העתק קוד</button>
  <p class="tip">הדבק את הקוד הזה בתוך המשחק (recycling-game.html) בשורה שמסומנת "BOTTLES_HERE"</p>
</div>

<script>
let dots=[];
const scene=document.getElementById('scene');
const img=document.getElementById('bg');

function getPos(e){
  const r=img.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{
    x:parseFloat(((src.clientX-r.left)/r.width*100).toFixed(2)),
    y:parseFloat(((src.clientY-r.top)/r.height*100).toFixed(2))
  };
}

scene.addEventListener('click',function(e){
  if(e.target.classList.contains('dot'))return;
  add(getPos(e));
});
scene.addEventListener('touchend',function(e){
  e.preventDefault();
  if(e.target.classList.contains('dot'))return;
  const t=e.changedTouches[0];
  const r=img.getBoundingClientRect();
  add({
    x:parseFloat(((t.clientX-r.left)/r.width*100).toFixed(2)),
    y:parseFloat(((t.clientY-r.top)/r.height*100).toFixed(2))
  });
},{passive:false});

function add(pos){
  const n=dots.length+1;
  const id='d'+n;
  dots.push({id,x:pos.x,y:pos.y});
  const sz=Math.max(28,img.offsetWidth*0.055);
  const el=document.createElement('div');
  el.className='dot';el.id=id;
  el.style.cssText='left:'+pos.x+'%;top:'+pos.y+'%;width:'+sz+'px;height:'+sz+'px;';
  el.textContent=n;
  el.addEventListener('click',function(ev){ev.stopPropagation();removeDot(id);});
  scene.appendChild(el);
  updateCounter();
}
function removeDot(id){
  dots=dots.filter(d=>d.id!==id);
  const el=document.getElementById(id);
  if(el)el.remove();
  redrawNumbers();
  updateCounter();
}
function undo(){
  if(!dots.length)return;
  removeDot(dots[dots.length-1].id);
}
function redrawNumbers(){
  dots.forEach(function(d,i){
    const el=document.getElementById(d.id);
    if(el)el.textContent=i+1;
  });
}
function clearAll(){
  dots=[];
  scene.querySelectorAll('.dot').forEach(e=>e.remove());
  updateCounter();
  document.getElementById('out-wrap').style.display='none';
}
function updateCounter(){
  document.getElementById('counter').textContent=dots.length+' בקבוקים סומנו';
}
function generate(){
  if(!dots.length){alert('סמן לפחות בקבוק אחד!');return;}
  const lines=dots.map(function(d,i){
    const n=String(i+1).padStart(2,'0');
    return '  {"id":"b'+n+'","x":'+d.x+',"y":'+d.y+',"rw":2.6,"rh":5.5}';
  });
  var nl='\n'; const code='const BOTTLES=['+nl+lines.join(','+nl)+nl+'];';
  document.getElementById('output').textContent=code;
  document.getElementById('out-wrap').style.display='block';
  document.getElementById('out-wrap').scrollIntoView({behavior:'smooth'});
}
function copyCode(){
  const txt=document.getElementById('output').textContent;
  navigator.clipboard.writeText(txt).then(function(){
    alert('הועתק!');
  }).catch(function(){
    const ta=document.createElement('textarea');
    ta.value=txt;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');ta.remove();alert('הועתק!');
  });
}
window.addEventListener('resize',function(){
  const sz=Math.max(28,img.offsetWidth*0.055);
  scene.querySelectorAll('.dot').forEach(function(el){el.style.width=sz+'px';el.style.height=sz+'px';});
});
</script>
