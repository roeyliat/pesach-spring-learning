<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז למידה - פסח ואביב</title>
    
    <!-- טעינת Tailwind לעיצוב -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- טעינת React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- טעינת Babel כדי להריץ את קוד ה-React בתוך הדפדפן -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-5px); }
          75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // === מאגר המילים לפעילויות ===
        const vocabulary = [
          { id: 1, word: "אָבִיב", unvoweled: "אביב", chars: ["אָ", "בִ", "י", "ב"], emoji: "🌸" },
          { id: 2, word: "פַּרְפַּר", unvoweled: "פרפר", chars: ["פַּ", "רְ", "פַּ", "ר"], emoji: "🦋" },
          { id: 3, word: "פֶּסַח", unvoweled: "פסח", chars: ["פֶּ", "סַ", "ח"], emoji: "🍷" },
          { id: 4, word: "מַצָּה", unvoweled: "מצה", chars: ["מַ", "צָּ", "ה"], emoji: "🫓" },
          { id: 5, word: "הַגָּדָה", unvoweled: "הגדה", chars: ["הַ", "גָּ", "דָ", "ה"], emoji: "📖" },
          { id: 6, word: "עָנָן", unvoweled: "ענן", chars: ["עָ", "נָ", "ן"], emoji: "☁️" },
          { id: 7, word: "פֶּרַח", unvoweled: "פרח", chars: ["פֶּ", "רַ", "ח"], emoji: "🌺" },
          { id: 8, word: "דְּבַשׁ", unvoweled: "דבש", chars: ["דְּ", "בַ", "שׁ"], emoji: "🍯" },
          { id: 9, word: "נִיסָן", unvoweled: "ניסן", chars: ["נִ", "י", "סָ", "ן"], emoji: "📅" },
          { id: 10, word: "שְׁתִיל", unvoweled: "שתיל", chars: ["שְׁ", "תִ", "י", "ל"], emoji: "🪴" },
          { id: 11, word: "שִׂמְחָה", unvoweled: "שמחה", chars: ["שִׂ", "מְ", "חָ", "ה"], emoji: "😄" },
          { id: 12, word: "אֱגוֹז", unvoweled: "אגוז", chars: ["אֱ", "גוֹ", "ז"], emoji: "🌰" }
        ];

        // === מאגר מילים למשחק המיון ===
        const sortingWordsData = [
          { id: 101, word: "פַּרְפַּר", category: "חי", emoji: "🦋" },
          { id: 102, word: "אַרְנָב", category: "חי", emoji: "🐰" },
          { id: 103, word: "דָּגִים", category: "חי", emoji: "🐟" },
          { id: 104, word: "מַכַּת כִּנִּים", category: "חי", emoji: "🐜" },
          { id: 105, word: "זַחַל", category: "חי", emoji: "🐛" },
          { id: 106, word: "כַּרְפַּס", category: "צומח", emoji: "🌿" },
          { id: 107, word: "פְּרָחִים", category: "צומח", emoji: "💐" },
          { id: 108, word: "חִטָּה", category: "צומח", emoji: "🌾" },
          { id: 109, word: "כַּלָּנִית", category: "צומח", emoji: "🌺" },
          { id: 110, word: "נַרְקִיס", category: "צומח", emoji: "🌼" },
          { id: 111, word: "מַצָּה", category: "דומם", emoji: "🫓" },
          { id: 112, word: "הַגָּדָה", category: "דומם", emoji: "📖" },
          { id: 113, word: "יַיִן", category: "דומם", emoji: "🍷" },
          { id: 114, word: "גָּבִיעַ", category: "דומם", emoji: "🍷" },
          { id: 115, word: "קְעָרָה", category: "דומם", emoji: "🍽️" },
          { id: 116, word: "פִּירָמִידָה", category: "דומם", emoji: "🔺" },
          { id: 117, word: "דָּם", category: "דומם", emoji: "🩸" },
          { id: 118, word: "בָּרָד", category: "דומם", emoji: "🧊" },
          { id: 119, word: "מַיִם", category: "דומם", emoji: "💧" }
        ];

        // === מאגר שאלות לחידון האביב ===
        const quizQuestions = [
          { id: 1, question: "מְצָא אֶת מִלַּת הָאָבִיב!", options: ["פַּרְפַּר", "תִּיק", "קִיר", "בַּיִת"], correct: "פַּרְפַּר", emoji: "🦋" },
          { id: 2, question: "מִי קָשׁוּר לָאָבִיב?", options: ["קַלְמָר", "פְּרָחִים", "פִּיל", "צַלַּחַת"], correct: "פְּרָחִים", emoji: "💐" },
          { id: 3, question: "אֵיזוֹ מִלָּה מַתְאִימָה לָעוֹנָה?", options: ["יָם", "שַׁיִט", "גָּמָל", "גִּנָּה"], correct: "גִּנָּה", emoji: "🌳" },
          { id: 4, question: "חַפְּשׂוּ אֶת מִלַּת הָאָבִיב:", options: ["פַּח", "כַּד", "זַחַל", "פִּנְקָס"], correct: "זַחַל", emoji: "🐛" },
          { id: 5, question: "מָה קוֹרֶה עַכְשָׁיו בַּטֶּבַע?", options: ["סַכִּין", "כִּתָּה", "פַּטִּישׁ", "פְּרִיחָה"], correct: "פְּרִיחָה", emoji: "🌸" }
        ];

        // === מאגר משפטים ===
        const sentences = [
          { words: ["אָבִיב", "בָּא", "פֶּסַח", "בָּא"], expected: "אָבִיב בָּא פֶּסַח בָּא", emoji: "🌸🍷" },
          { words: ["אֲנִי", "אוֹהֵב", "לֶאֱכוֹל", "מַצָּה"], expected: "אֲנִי אוֹהֵב לֶאֱכוֹל מַצָּה", emoji: "😋🫓" },
          { words: ["הַפַּרְפַּר", "עָף", "אֶל", "הַפֶּרַח"], expected: "הַפַּרְפַּר עָף אֶל הַפֶּרַח", emoji: "🦋🌺" },
          { words: ["אֲנַחְנוּ", "קוֹרְאִים", "בַּהַגָּדָה"], expected: "אֲנַחְנוּ קוֹרְאִים בַּהַגָּדָה", emoji: "👨‍👩‍👧‍👦📖" },
          { words: ["מֹשֶׁה", "בַּתֵּבָה", "עַל", "הַיְּאוֹר"], expected: "מֹשֶׁה בַּתֵּבָה עַל הַיְּאוֹר", emoji: "👶🌊" },
          { words: ["פַּרְעֹה", "מֶלֶךְ", "מִצְרַיִם"], expected: "פַּרְעֹה מֶלֶךְ מִצְרַיִם", emoji: "👑🔺" },
          { words: ["שִׂמְחָה", "רַבָּה", "אָבִיב", "הִגִּיעַ"], expected: "שִׂמְחָה רַבָּה אָבִיב הִגִּיעַ", emoji: "😄🌸" }
        ];

        const hebrewKeyboard = [
          ['ק', 'ר', 'א', 'ט', 'ו', 'ן', 'ם', 'פ'],
          ['ש', 'ד', 'ג', 'כ', 'ע', 'י', 'ח', 'ל', 'ך', 'ף'],
          ['ז', 'ס', 'ב', 'ה', 'נ', 'מ', 'צ', 'ת', 'ץ']
        ];

        // פונקציות עזר כלליות
        const shuffleArray = (array) => {
          const newArr = [...array];
          for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
          }
          return newArr;
        };

        const speakWord = (text) => {
          if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'he-IL';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
          }
        };

        // ==========================================
        // 1. קריאה עם סמלים
        // ==========================================
        function MatchActivity({ vocabulary, onBack }) {
          const [levelIndex, setLevelIndex] = useState(0);
          const [options, setOptions] = useState([]);
          const [isWin, setIsWin] = useState(false);
          const [wrongShakeId, setWrongShakeId] = useState(null);

          const currentWord = vocabulary[levelIndex];

          useEffect(() => {
            const otherWords = vocabulary.filter(w => w.id !== currentWord.id);
            const shuffledOthers = shuffleArray(otherWords);
            setOptions(shuffleArray([currentWord, shuffledOthers[0], shuffledOthers[1]]));
            setIsWin(false);
            setWrongShakeId(null);
          }, [levelIndex, currentWord]);

          const handleOptionClick = (option) => {
            if (isWin) return;
            if (option.id === currentWord.id) {
              setIsWin(true);
              speakWord(option.word);
            } else {
              setWrongShakeId(option.id);
              setTimeout(() => setWrongShakeId(null), 500);
            }
          };

          return (
            <div className="flex flex-col items-center py-10 px-4 relative">
               <div className="w-full max-w-3xl flex justify-between items-center mb-6">
                <span className="text-gray-500 font-bold bg-white px-4 py-2 rounded-full shadow-sm">מילה {levelIndex + 1} מתוך {vocabulary.length}</span>
              </div>
              <div className="bg-white rounded-3xl p-8 shadow-xl max-w-2xl w-full text-center border-t-8 border-green-400 relative overflow-hidden">
                <p className="text-2xl text-gray-700 mb-6 font-bold">אֵיזוֹ מִלָּה מַתְאִימָה לַתְּמוּנָה?</p>
                <div className="bg-green-50 w-48 h-48 mx-auto rounded-full flex items-center justify-center border-4 border-green-100 mb-10 shadow-inner">
                  <span className="text-8xl md:text-9xl">{currentWord.emoji}</span>
                </div>
                <div className="flex flex-col gap-4">
                  {options.map((option) => (
                    <button key={option.id} onClick={() => handleOptionClick(option)}
                      className={`text-4xl md:text-5xl font-bold py-6 px-4 rounded-2xl border-2 transition-all duration-300
                        ${isWin && option.id === currentWord.id ? 'bg-green-500 border-green-600 text-white scale-105 shadow-lg' : ''}
                        ${!isWin && wrongShakeId === option.id ? 'bg-red-100 border-red-400 text-red-600 animate-shake' : ''}
                        ${!isWin && wrongShakeId !== option.id ? 'bg-white border-gray-200 text-gray-800 hover:border-green-400 hover:bg-green-50 shadow-sm' : ''}
                        ${isWin && option.id !== currentWord.id ? 'opacity-50 grayscale' : ''}
                      `}>
                      {option.word}
                    </button>
                  ))}
                </div>
                {isWin && (
                  <div className="absolute inset-x-0 bottom-0 bg-white/95 backdrop-blur-sm p-6 flex flex-col items-center border-t border-green-100">
                    <h3 className="text-3xl font-bold text-green-600 mb-4">קְרִיאָה נְכוֹנָה! אַלּוּפִים!</h3>
                    <button onClick={() => setLevelIndex((prev) => (prev + 1) % vocabulary.length)} className="bg-green-500 text-white px-8 py-3 rounded-full text-2xl font-bold hover:bg-green-600 shadow-md">
                      לַמִּלָּה הַבָּאָה ✅
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // 2. תרגול העתקה / כתיבה
        // ==========================================
        function CopyActivity({ vocabulary }) {
          const [levelIndex, setLevelIndex] = useState(0);
          const [typedChars, setTypedChars] = useState('');
          const [isWin, setIsWin] = useState(false);
          const [errorShake, setErrorShake] = useState(false);

          const currentWord = vocabulary[levelIndex];

          useEffect(() => { setTypedChars(''); setIsWin(false); }, [levelIndex]);

          const handleKeyPress = (char) => {
            if (isWin) return;
            const expectedChar = currentWord.unvoweled[typedChars.length];
            if (char === expectedChar) {
              const newTyped = typedChars + char;
              setTypedChars(newTyped);
              if (newTyped === currentWord.unvoweled) {
                setIsWin(true);
                speakWord(currentWord.word);
              }
            } else {
              setErrorShake(true); setTimeout(() => setErrorShake(false), 500);
            }
          };

          return (
            <div className="flex flex-col items-center py-6 px-4 relative">
              <div className="w-full max-w-3xl flex justify-between items-center mb-4">
                <span className="text-gray-500 font-bold bg-white px-4 py-2 rounded-full shadow-sm">העתקה {levelIndex + 1} מתוך {vocabulary.length}</span>
              </div>
              <div className="bg-white rounded-3xl p-6 shadow-xl max-w-2xl w-full text-center border-t-8 border-yellow-400 mb-6">
                <div className="mb-6 flex flex-col items-center">
                  <span className="text-xl text-gray-700 font-bold mb-2">קִרְאוּ אֶת הַמִּלָּה וְהַקְלִידוּ:</span>
                  <div className="flex items-center justify-center gap-4">
                    <span className="text-6xl md:text-7xl font-extrabold text-gray-800 tracking-widest">{currentWord.word}</span>
                    <button onClick={() => speakWord(currentWord.word)} className="bg-yellow-50 text-yellow-600 p-3 rounded-full hover:bg-yellow-100 text-2xl">🔊</button>
                  </div>
                </div>
                <div className={`flex justify-center gap-2 mb-8 ${errorShake ? 'animate-shake' : ''}`}>
                  {currentWord.chars.map((char, i) => {
                    const hasChar = i < typedChars.length;
                    return (
                      <div key={i} className={`w-14 h-16 md:w-20 md:h-24 flex items-center justify-center rounded-xl text-4xl md:text-5xl font-bold transition-all ${hasChar ? 'bg-yellow-100 border-2 border-yellow-400 text-gray-900 shadow-inner' : 'bg-gray-100 border-2 border-dashed border-gray-300'}`}>
                        {hasChar ? char : ''}
                      </div>
                    );
                  })}
                </div>
                {isWin ? (
                   <div className="py-8 bg-yellow-50 rounded-2xl border-2 border-yellow-200">
                     <div className="text-6xl mb-4">🎉</div>
                     <h3 className="text-3xl font-bold text-gray-800 mb-6">כְּתִיבָה מְצֻיֶּנֶת!</h3>
                     <button onClick={() => setLevelIndex((prev) => (prev + 1) % vocabulary.length)} className="bg-yellow-500 text-white px-8 py-3 rounded-full text-2xl font-bold hover:bg-yellow-600 shadow-md">לַמִּלָּה הַבָּאָה</button>
                   </div>
                ) : (
                  <div className="bg-gray-100 p-3 md:p-5 rounded-2xl flex flex-col gap-2">
                    {hebrewKeyboard.map((row, rowIndex) => (
                      <div key={rowIndex} className="flex justify-center gap-1 md:gap-2">
                        {row.map(char => (
                          <button key={char} onClick={() => handleKeyPress(char)} className="w-10 h-12 md:w-14 md:h-16 bg-white rounded-lg shadow-sm border border-gray-200 text-xl md:text-2xl font-bold text-gray-700 hover:bg-yellow-100 hover:border-yellow-400 active:scale-95 transition-all">{char}</button>
                        ))}
                      </div>
                    ))}
                    <div className="flex justify-center mt-2">
                      <button onClick={() => setTypedChars(typedChars.slice(0, -1))} className="flex items-center justify-center gap-2 bg-gray-300 px-6 py-3 rounded-lg font-bold text-gray-700 hover:bg-red-200 transition active:scale-95">⌫ מחיקה</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // 3. הרכבת מילים
        // ==========================================
        function BuildActivity({ vocabulary }) {
          const [levelIndex, setLevelIndex] = useState(0);
          const [availableChars, setAvailableChars] = useState([]);
          const [slots, setSlots] = useState([]);
          const [isError, setIsError] = useState(false);
          const [isWin, setIsWin] = useState(false);

          const currentWord = vocabulary[levelIndex];

          useEffect(() => { initLevel(); }, [levelIndex]);

          const initLevel = () => {
            const charObjects = currentWord.chars.map((char, i) => ({ id: i, char }));
            setAvailableChars(shuffleArray(charObjects));
            setSlots(Array(currentWord.chars.length).fill(null));
            setIsError(false); setIsWin(false);
          };

          const handleAvailableCharClick = (charObj) => {
            if (isWin) return;
            const firstEmptyIndex = slots.findIndex(slot => slot === null);
            if (firstEmptyIndex !== -1) {
              const newSlots = [...slots]; newSlots[firstEmptyIndex] = charObj;
              setSlots(newSlots); setAvailableChars(availableChars.filter(c => c.id !== charObj.id)); setIsError(false);
            }
          };

          const handleSlotClick = (index) => {
            if (isWin || slots[index] === null) return;
            const charObj = slots[index];
            const newSlots = [...slots]; newSlots[index] = null;
            setSlots(newSlots); setAvailableChars([...availableChars, charObj]); setIsError(false);
          };

          useEffect(() => {
            const isFull = slots.every(slot => slot !== null);
            if (isFull && !isWin) {
              const currentText = slots.map(s => s.char).join('');
              const targetText = currentWord.chars.join('');
              if (currentText === targetText) { setIsWin(true); speakWord(currentWord.word); } 
              else { setIsError(true); }
            }
          }, [slots, isWin, currentWord]);

          return (
            <div className="flex flex-col items-center py-10 px-4 relative">
              <div className="w-full max-w-3xl flex justify-between items-center mb-6">
                <span className="text-gray-500 font-bold bg-white px-4 py-2 rounded-full shadow-sm">מילה {levelIndex + 1} מתוך {vocabulary.length}</span>
                <button onClick={initLevel} className="text-gray-500 hover:text-blue-600 bg-white p-2 rounded-full shadow-sm text-xl">🔄</button>
              </div>
              <div className="bg-white rounded-3xl p-8 shadow-xl max-w-2xl w-full text-center border-t-8 border-blue-400 relative">
                <p className="text-2xl text-gray-700 font-bold mb-4">מַרְכִּיבִים אֶת הַמִּלָּה</p>
                <div className="text-8xl mb-4">{currentWord.emoji}</div>
                <div className={`flex flex-wrap justify-center gap-3 mb-10 ${isError ? 'animate-shake' : ''}`}>
                  {slots.map((slot, index) => (
                    <div key={index} onClick={() => handleSlotClick(index)} className={`w-16 h-16 md:w-20 md:h-20 flex items-center justify-center rounded-2xl text-4xl font-bold transition-all ${slot ? 'bg-blue-50 border-2 border-blue-400 cursor-pointer shadow-md text-gray-800' : `bg-gray-50 border-2 border-dashed ${isError ? 'border-red-400 bg-red-50' : 'border-gray-300'}`}`}>
                      {slot ? slot.char : ''}
                    </div>
                  ))}
                </div>
                <div className="bg-blue-50/50 rounded-2xl p-6 border border-blue-100 min-h-[120px]">
                  <div className="flex flex-wrap justify-center gap-3">
                    {availableChars.map((charObj) => (
                      <button key={charObj.id} onClick={() => handleAvailableCharClick(charObj)} className="w-16 h-16 md:w-20 md:h-20 bg-white border-2 border-blue-200 rounded-2xl text-4xl font-bold hover:bg-blue-100 shadow-sm text-gray-800">{charObj.char}</button>
                    ))}
                  </div>
                </div>
                {isWin && (
                  <div className="absolute inset-0 z-10 bg-white/95 backdrop-blur-sm rounded-3xl flex flex-col items-center justify-center p-6">
                    <div className="text-6xl mb-4">⭐</div>
                    <h3 className="text-4xl font-bold text-blue-600 mb-2">כָּל הַכָּבוֹד!</h3>
                    <p className="text-6xl font-extrabold text-gray-800 mb-8">{currentWord.word}</p>
                    <button onClick={() => setLevelIndex((prev) => (prev + 1) % vocabulary.length)} className="bg-blue-500 text-white px-8 py-3 rounded-full text-2xl font-bold hover:bg-blue-600 shadow-lg">לַמִּלָּה הַבָּאָה ✅</button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // 4. משחק זיכרון
        // ==========================================
        function MemoryActivity({ vocabulary }) {
          const [cards, setCards] = useState([]);
          const [flipped, setFlipped] = useState([]);
          const [matched, setMatched] = useState([]);
          const [isLocked, setIsLocked] = useState(false);

          useEffect(() => {
            const gameWords = shuffleArray([...vocabulary]).slice(0, 6);
            let initialCards = [];
            gameWords.forEach(w => {
              initialCards.push({ id: `${w.id}-text`, matchId: w.id, content: w.word, type: 'text' });
              initialCards.push({ id: `${w.id}-img`, matchId: w.id, content: w.emoji, type: 'img' });
            });
            setCards(shuffleArray(initialCards));
            setFlipped([]); setMatched([]);
          }, [vocabulary]);

          const handleCardClick = (index) => {
            if (isLocked || flipped.includes(index) || matched.includes(cards[index].matchId)) return;
            const newFlipped = [...flipped, index];
            setFlipped(newFlipped);
            if (newFlipped.length === 2) {
              setIsLocked(true);
              const match1 = cards[newFlipped[0]].matchId;
              const match2 = cards[newFlipped[1]].matchId;
              if (match1 === match2) {
                setMatched([...matched, match1]); setFlipped([]); setIsLocked(false);
              } else {
                setTimeout(() => { setFlipped([]); setIsLocked(false); }, 1000);
              }
            }
          };

          const isGameComplete = matched.length === 6 && cards.length > 0;

          return (
            <div className="flex flex-col items-center py-6 px-4">
              <div className="bg-white rounded-3xl p-6 shadow-xl max-w-3xl w-full border-t-8 border-pink-400">
                <p className="text-2xl text-center text-gray-700 font-bold mb-6">מִצְאוּ אֶת כָּל הַזּוּגוֹת!</p>
                <div className="grid grid-cols-3 sm:grid-cols-4 gap-4">
                  {cards.map((card, idx) => {
                    const isFlipped = flipped.includes(idx) || matched.includes(card.matchId);
                    return (
                      <div key={card.id} className="perspective-1000 w-full aspect-square" onClick={() => handleCardClick(idx)}>
                        <div className={`relative w-full h-full transition-transform duration-500 transform-style-3d cursor-pointer ${isFlipped ? 'rotate-y-180' : ''}`}>
                          <div className="absolute w-full h-full bg-pink-100 rounded-2xl border-4 border-pink-200 flex justify-center items-center backface-hidden shadow-sm">
                            <span className="text-4xl">🌸</span>
                          </div>
                          <div className="absolute w-full h-full bg-white rounded-2xl border-4 border-pink-400 flex justify-center items-center backface-hidden rotate-y-180 shadow-md">
                            <span className={card.type === 'img' ? 'text-6xl' : 'text-3xl font-bold text-pink-700'}>{card.content}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {isGameComplete && (
                  <div className="mt-8 text-center">
                     <div className="text-6xl mb-4">🎉</div>
                     <h3 className="text-3xl font-bold text-gray-800 mb-4">אַלּוּפֵי הַזִּכָּרוֹן!</h3>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // 5. מרכיבים משפטים
        // ==========================================
        function SentenceActivity({ sentences }) {
          const [levelIndex, setLevelIndex] = useState(0);
          const [bank, setBank] = useState([]);
          const [slots, setSlots] = useState([]);
          const [isError, setIsError] = useState(false);
          const [isWin, setIsWin] = useState(false);

          const currentSentence = sentences[levelIndex];

          useEffect(() => {
            setBank(shuffleArray(currentSentence.words.map((word, i) => ({ id: i, word }))));
            setSlots([]); setIsError(false); setIsWin(false);
          }, [levelIndex, currentSentence]);

          const moveToSlot = (wordObj) => {
            if (isWin) return;
            setSlots([...slots, wordObj]); setBank(bank.filter(w => w.id !== wordObj.id)); setIsError(false);
          };

          const moveToBank = (wordObj) => {
            if (isWin) return;
            setBank([...bank, wordObj]); setSlots(slots.filter(w => w.id !== wordObj.id)); setIsError(false);
          };

          useEffect(() => {
            if (bank.length === 0 && slots.length > 0 && !isWin) {
              const userSentence = slots.map(s => s.word).join(" ");
              if (userSentence === currentSentence.expected) { setIsWin(true); speakWord(currentSentence.expected); } 
              else { setIsError(true); }
            }
          }, [bank, slots, isWin, currentSentence]);

          return (
            <div className="flex flex-col items-center py-10 px-4 relative">
               <div className="w-full max-w-3xl flex justify-between items-center mb-6">
                <span className="text-gray-500 font-bold bg-white px-4 py-2 rounded-full shadow-sm">משפט {levelIndex + 1} מתוך {sentences.length}</span>
              </div>
              <div className="bg-white rounded-3xl p-8 shadow-xl max-w-3xl w-full text-center border-t-8 border-purple-400 relative">
                <p className="text-2xl text-gray-700 font-bold mb-4">סַדְּרוּ אֶת הַמִּלִּים לְמִשְׁפָּט נָכוֹן</p>
                <div className="text-8xl mb-8">{currentSentence.emoji}</div>
                <div className={`min-h-[80px] w-full p-4 bg-purple-50 rounded-2xl border-2 border-dashed ${isError ? 'border-red-400 bg-red-50 animate-shake' : 'border-purple-300'} flex flex-wrap gap-3 justify-center items-center mb-8`}>
                  {slots.length === 0 && <span className="text-gray-400 text-lg">לַחְצוּ עַל הַמִּלִּים בַּסֵּדֶר הַנָּכוֹן...</span>}
                  {slots.map((wordObj) => (
                    <div key={wordObj.id} onClick={() => moveToBank(wordObj)} className="bg-white border-2 border-purple-400 text-purple-900 px-5 py-3 rounded-xl text-3xl font-bold cursor-pointer hover:bg-red-50 shadow-sm transition-colors">{wordObj.word}</div>
                  ))}
                </div>
                <div className="flex flex-wrap justify-center gap-4">
                  {bank.map((wordObj) => (
                    <button key={wordObj.id} onClick={() => moveToSlot(wordObj)} className="bg-purple-100 border-2 border-purple-200 text-purple-800 px-6 py-3 rounded-xl text-3xl font-bold hover:bg-purple-200 shadow-sm">{wordObj.word}</button>
                  ))}
                </div>
                {isWin && (
                  <div className="absolute inset-0 z-10 bg-white/95 backdrop-blur-sm rounded-3xl flex flex-col items-center justify-center p-6">
                    <h3 className="text-4xl font-bold text-purple-600 mb-4">מִשְׁפָּט מֻשְׁלָם!</h3>
                    <p className="text-5xl font-bold text-gray-800 mb-8 leading-relaxed text-center">{currentSentence.expected}</p>
                    <button onClick={() => setLevelIndex((prev) => (prev + 1) % sentences.length)} className="bg-purple-500 text-white px-8 py-3 rounded-full text-2xl font-bold hover:bg-purple-600 shadow-lg">לַמִּשְׁפָּט הַבָּא ✅</button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // 6. משחק המיון
        // ==========================================
        function SortActivity() {
          const [words, setWords] = useState([]);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [columns, setColumns] = useState({ חי: [], צומח: [], דומם: [] });
          const [shake, setShake] = useState(false);
          const [isWin, setIsWin] = useState(false);

          useEffect(() => {
            setWords(shuffleArray(sortingWordsData));
            setColumns({ חי: [], צומח: [], דומם: [] });
            setCurrentIndex(0); setIsWin(false);
          }, []);

          const handleCategoryClick = (category) => {
            if (isWin) return;
            const currentWord = words[currentIndex];
            if (currentWord.category === category) {
              setColumns(prev => ({ ...prev, [category]: [...prev[category], currentWord] }));
              if (currentIndex + 1 < words.length) {
                setCurrentIndex(currentIndex + 1); speakWord(words[currentIndex + 1].word);
              } else { setIsWin(true); }
            } else {
              setShake(true); setTimeout(() => setShake(false), 500);
            }
          };

          if (words.length === 0) return null;
          const currentWord = words[currentIndex];

          return (
            <div className="flex flex-col items-center py-6 px-4 relative">
              <div className="w-full max-w-4xl flex justify-between items-center mb-6">
                <span className="text-gray-500 font-bold bg-white px-4 py-2 rounded-full shadow-sm">מילה {currentIndex + 1} מתוך {words.length}</span>
              </div>
              <div className="bg-white rounded-3xl p-6 md:p-8 shadow-xl max-w-4xl w-full text-center border-t-8 border-orange-400 relative">
                {!isWin ? (
                  <>
                    <p className="text-2xl text-gray-700 font-bold mb-4">לְאֵיזוֹ קְבוּצָה שַׁיֶּכֶת הַמִּלָּה?</p>
                    <div className={`my-8 flex flex-col items-center justify-center p-6 bg-orange-50 rounded-2xl border-2 border-orange-100 min-h-[160px] transition-all ${shake ? 'animate-shake bg-red-50 border-red-200 text-red-600' : ''}`}>
                      <span className="text-6xl md:text-8xl font-extrabold text-gray-800 drop-shadow-sm">{currentWord.word}</span>
                    </div>
                    <div className="grid grid-cols-3 gap-3 md:gap-6 mb-10">
                      <button onClick={() => handleCategoryClick('חי')} className="bg-green-100 hover:bg-green-200 text-green-800 border-2 border-green-300 rounded-xl py-4 md:py-6 text-xl md:text-3xl font-bold shadow-sm active:scale-95 flex flex-col items-center gap-2"><span>חַי</span><span className="text-3xl md:text-4xl">🦋</span></button>
                      <button onClick={() => handleCategoryClick('צומח')} className="bg-emerald-100 hover:bg-emerald-200 text-emerald-800 border-2 border-emerald-300 rounded-xl py-4 md:py-6 text-xl md:text-3xl font-bold shadow-sm active:scale-95 flex flex-col items-center gap-2"><span>צוֹמֵחַ</span><span className="text-3xl md:text-4xl">🌿</span></button>
                      <button onClick={() => handleCategoryClick('דומם')} className="bg-slate-100 hover:bg-slate-200 text-slate-800 border-2 border-slate-300 rounded-xl py-4 md:py-6 text-xl md:text-3xl font-bold shadow-sm active:scale-95 flex flex-col items-center gap-2"><span>דּוֹמֵם</span><span className="text-3xl md:text-4xl">🪨</span></button>
                    </div>
                  </>
                ) : (
                  <div className="py-10">
                     <div className="text-6xl mb-6">🎉</div>
                     <h3 className="text-4xl font-bold text-gray-800 mb-4">מִיּוּן מֻשְׁלָם! אַלּוּפִים!</h3>
                  </div>
                )}
                <div className="grid grid-cols-3 gap-2 md:gap-6 border-t border-gray-100 pt-6">
                  <div className="bg-green-50/50 rounded-xl p-2 md:p-4 min-h-[200px] border border-green-100">
                    <h4 className="font-bold text-green-800 mb-4 text-lg md:text-xl border-b border-green-200 pb-2">חַי</h4>
                    <div className="flex flex-col gap-2">{columns['חי'].map(w => (<div key={w.id} className="bg-white p-2 md:px-3 md:py-2 rounded shadow-sm text-sm md:text-lg font-bold text-gray-700 flex justify-between items-center"><span>{w.word}</span><span>{w.emoji}</span></div>))}</div>
                  </div>
                  <div className="bg-emerald-50/50 rounded-xl p-2 md:p-4 min-h-[200px] border border-emerald-100">
                    <h4 className="font-bold text-emerald-800 mb-4 text-lg md:text-xl border-b border-emerald-200 pb-2">צוֹמֵחַ</h4>
                    <div className="flex flex-col gap-2">{columns['צומח'].map(w => (<div key={w.id} className="bg-white p-2 md:px-3 md:py-2 rounded shadow-sm text-sm md:text-lg font-bold text-gray-700 flex justify-between items-center"><span>{w.word}</span><span>{w.emoji}</span></div>))}</div>
                  </div>
                  <div className="bg-slate-50/50 rounded-xl p-2 md:p-4 min-h-[200px] border border-slate-100">
                    <h4 className="font-bold text-slate-800 mb-4 text-lg md:text-xl border-b border-slate-200 pb-2">דּוֹמֵם</h4>
                    <div className="flex flex-col gap-2">{columns['דומם'].map(w => (<div key={w.id} className="bg-white p-2 md:px-3 md:py-2 rounded shadow-sm text-sm md:text-lg font-bold text-gray-700 flex justify-between items-center"><span>{w.word}</span><span>{w.emoji}</span></div>))}</div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // ==========================================
        // 7. חידון
        // ==========================================
        function QuizActivity() {
          const [levelIndex, setLevelIndex] = useState(0);
          const [isWin, setIsWin] = useState(false);
          const [wrongShakeId, setWrongShakeId] = useState(null);

          const currentQuestion = quizQuestions[levelIndex];

          const handleOptionClick = (option, index) => {
            if (isWin) return;
            if (option === currentQuestion.correct) {
              setIsWin(true); speakWord(option); 
            } else {
              setWrongShakeId(index); setTimeout(() => setWrongShakeId(null), 500);
            }
          };

          return (
            <div className="flex flex-col items-center py-10 px-4 relative">
              <div className="w-full max-w-3xl flex justify-between items-center mb-6">
                <span className="text-gray-500 font-bold bg-white px-4 py-2 rounded-full shadow-sm">שאלה {levelIndex + 1} מתוך {quizQuestions.length}</span>
              </div>
              <div className="bg-white rounded-3xl p-8 shadow-xl max-w-2xl w-full text-center border-t-8 border-cyan-400 relative overflow-hidden">
                <div className="flex flex-col items-center justify-center gap-4 mb-8 bg-cyan-50 p-6 rounded-2xl border-2 border-cyan-100">
                  <p className="text-3xl md:text-4xl text-gray-800 font-bold leading-relaxed">{currentQuestion.question}</p>
                  <button onClick={() => speakWord(currentQuestion.question)} className="flex items-center gap-2 bg-cyan-500 text-white px-6 py-3 rounded-full text-xl font-bold hover:bg-cyan-600 shadow-md active:scale-95">🔊 הַקְרָאַת הַשְּׁאֵלָה</button>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  {currentQuestion.options.map((option, index) => (
                    <button key={index} onClick={() => handleOptionClick(option, index)}
                      className={`text-3xl md:text-4xl font-bold py-6 px-4 rounded-2xl border-2 transition-all duration-300
                        ${isWin && option === currentQuestion.correct ? 'bg-cyan-500 border-cyan-600 text-white scale-105 shadow-lg' : ''}
                        ${!isWin && wrongShakeId === index ? 'bg-red-100 border-red-400 text-red-600 animate-shake' : ''}
                        ${!isWin && wrongShakeId !== index ? 'bg-white border-gray-200 text-gray-800 hover:border-cyan-400 hover:bg-cyan-50 shadow-sm' : ''}
                        ${isWin && option !== currentQuestion.correct ? 'opacity-50 grayscale' : ''}
                      `}>
                      {option}
                    </button>
                  ))}
                </div>
                {isWin && (
                  <div className="absolute inset-x-0 bottom-0 bg-white/95 backdrop-blur-sm p-6 flex flex-col items-center border-t border-cyan-100">
                    <h3 className="text-3xl font-bold text-cyan-600 mb-4">תְּשׁוּבָה נְכוֹנָה! {currentQuestion.emoji}</h3>
                    <button onClick={() => { setLevelIndex((prev) => (prev + 1) % quizQuestions.length); setIsWin(false); }} className="bg-cyan-500 text-white px-8 py-3 rounded-full text-2xl font-bold hover:bg-cyan-600 shadow-md">לַשְּׁאֵלָה הַבָּאָה ✅</button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // אפליקציה ראשית
        // ==========================================

                <div className="absolute bottom-10 left-10 text-6xl opacity-40">🦋</div>
                <div className="absolute top-20 left-20 text-6xl opacity-40">🫓</div>
                
                <div className="text-center mb-10 z-10 pt-10">
                  <h1 className="text-5xl md:text-6xl font-extrabold text-green-800 mb-4 drop-shadow-md">פֶּסַח וְאָבִיב בְּכִתָּה א'</h1>
                  <p className="text-2xl text-green-700 font-medium bg-white/50 inline-block px-6 py-2 rounded-full shadow-sm">קריאה וכתיבה - לומדים ונהנים!</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-5xl z-10 px-4 pb-10">
                  <button onClick={() => setCurrentScreen('match')} className="bg-white rounded-3xl p-6 shadow-xl hover:-translate-y-2 transition-all duration-300 border-b-8 border-green-400 flex flex-col items-center text-center">
                    <div className="bg-green-100 text-4xl p-5 rounded-full mb-4">🖼️</div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">קְרִיאָה עִם סְמָלִים</h2>
                    <p className="text-gray-600">קוראים את המילות ומתאימים לתמונה הנכונה.</p>
                  </button>

                  <button onClick={() => setCurrentScreen('copy')} className="bg-white rounded-3xl p-6 shadow-xl hover:-translate-y-2 transition-all duration-300 border-b-8 border-yellow-400 flex flex-col items-center text-center">
                    <div className="bg-yellow-100 text-4xl p-5 rounded-full mb-4">✍️</div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">תִּרְגּוּל כְּתִיבָה</h2>
                    <p className="text-gray-600">מסתכלים על המילה, קוראים ומקלידים אותה.</p>
                  </button>

                  <button onClick={() => setCurrentScreen('build')} className="bg-white rounded-3xl p-6 shadow-xl hover:-translate-y-2 transition-all duration-300 border-b-8 border-blue-400 flex flex-col items-center text-center">
                    <div className="bg-blue-100 text-4xl p-5 rounded-full mb-4">🖱️</div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">מַרְכִּיבִים מִלִּים</h2>
                    <p className="text-gray-600">בוחרים את האותיות לפי הסדר כדי לבנות מילה.</p>
                  </button>

                  <button onClick={() => setCurrentScreen('memory')} className="bg-white rounded-3xl p-6 shadow-xl hover:-translate-y-2 transition-all duration-300 border-b-8 border-pink-400 flex flex-col items-center text-center">
                    <div className="bg-pink-100 text-4xl p-5 rounded-full mb-4">🗂️</div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">מִשְׂחַק זִכָּרוֹן</h2>
                    <p className="text-gray-600">זוכרים איפה מסתתרת המילה ואיפה התמונה.</p>
                  </button>

                  <button onClick={() => setCurrentScreen('sentence')} className="bg-white rounded-3xl p-6 shadow-xl hover:-translate-y-2 transition-all duration-300 border-b-8 border-purple-400 flex flex-col items-center text-center">
                    <div className="bg-purple-100 text-4xl p-5 rounded-full mb-4">📝</div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">מִשְׁפָּטִים</h2>
                    <p className="text-gray-600">קוראים את המילים ומסדרים אותן למשפט נכון.</p>
                  </button>

                  <button onClick={() => setCurrentScreen('sort')} className="bg-white rounded-3xl p-6 shadow-xl hover:-translate-y-2 transition-all duration-300 border-b-8 border-orange-400 flex flex-col items-center text-center">
                    <div className="bg-orange-100 text-4xl p-5 rounded-full mb-4">🗃️</div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">חַי, צוֹמֵחַ, דּוֹמֵם</h2>
                    <p className="text-gray-600">ממיינים את המילים לקבוצות המתאימות.</p>
                  </button>

                  <button onClick={() => setCurrentScreen('quiz')} className="bg-white rounded-3xl p-6 shadow-xl hover:-translate-y-2 transition-all duration-300 border-b-8 border-cyan-400 flex flex-col items-center text-center lg:col-start-2">
                    <div className="bg-cyan-100 text-4xl p-5 rounded-full mb-4">❓</div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">חִידוֹן הָאָבִיב</h2>
                    <p className="text-gray-600">שומעים את השאלה ובוחרים את התשובה הנכונה.</p>
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gray-50 pb-10">
              <div className="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-50">
                <button onClick={() => setCurrentScreen('menu')} className="flex items-center text-gray-600 hover:text-green-600 hover:bg-green-50 px-4 py-2 rounded-full transition-colors font-bold">
                  🏠 תפריט ראשי
                </button>
                <div className="text-lg font-bold text-green-700">
                  {currentScreen === 'build' && "מַרְכִּיבִים מִלִּים (כְּתִיבָה)"}
                  {currentScreen === 'copy' && "תִּרְגּוּל כְּתִיבָה (הַעְתָּקָה)"}
                  {currentScreen === 'match' && "קְרִיאָה עִם סְמָלִים"}
                  {currentScreen === 'memory' && "מִשְׂחַק זִכָּרוֹן אָבִיבִי"}
                  {currentScreen === 'sentence' && "מַרְכִּיבִים מִשְׁפָּטִים (הֲבָנָה)"}
                  {currentScreen === 'sort' && "מִיּוּן מִלִּים: חַי, צוֹמֵחַ וְדוֹמֵם"}
                  {currentScreen === 'quiz' && "חִידוֹן הָאָבִיב"}
                </div>
              </div>

              {currentScreen === 'build' && <BuildActivity vocabulary={vocabulary} />}
              {currentScreen === 'copy' && <CopyActivity vocabulary={vocabulary} />}
              {currentScreen === 'match' && <MatchActivity vocabulary={vocabulary} />}
              {currentScreen === 'memory' && <MemoryActivity vocabulary={vocabulary} />}
              {currentScreen === 'sentence' && <SentenceActivity sentences={sentences} />}
              {currentScreen === 'sort' && <SortActivity />}
              {currentScreen === 'quiz' && <QuizActivity />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
