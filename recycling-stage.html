<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Heebo','Segoe UI',Arial,sans-serif;direction:rtl;-webkit-tap-highlight-color:transparent}
body{background:#0a1a0a}
.wrap{max-width:640px;margin:0 auto;background:#111;overflow:hidden}
.hud{background:#2d1f0e;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:3px solid #5a3a10}
.badge{background:#3d2910;border:2px solid #7a5020;border-radius:10px;padding:6px 12px;font-size:14px;font-weight:700;color:#f5c842;white-space:nowrap}
.badge b{color:#fff}
.wallet{background:#0a2a0a;border:2px solid #2a7a2a;border-radius:10px;padding:6px 14px;font-size:15px;font-weight:700;color:#4adf7a;margin-right:auto;display:flex;align-items:center;gap:6px}
.wi{width:22px;height:22px;object-fit:contain}
.instruct{background:#1a3a6a;color:#fff;text-align:center;padding:10px 16px;font-size:17px;font-weight:700;line-height:1.4}
.pbar-wrap{background:#0a1a0a;padding:6px 14px;display:flex;align-items:center;gap:10px}
.pbar{flex:1;height:16px;background:#1a2a1a;border-radius:8px;overflow:hidden;border:1.5px solid #2a4a2a}
.pfill{height:100%;background:linear-gradient(90deg,#059669,#4adf7a);border-radius:8px;transition:width 0.4s cubic-bezier(.4,2,.4,1);width:0%}
.plbl{font-size:13px;color:#4adf7a;font-weight:700;white-space:nowrap}
.scene{position:relative;width:100%;overflow:hidden}
.bgimg{width:100%;display:block;user-select:none;-webkit-user-drag:none}

/* HOTSPOT — invisible oval, large for motor accessibility */
.hs{
  position:absolute;transform:translate(-50%,-50%);
  border-radius:50%;cursor:pointer;z-index:10;
  touch-action:manipulation;
  border:3px dashed transparent;
  transition:border-color 0.15s,background 0.15s;
}
.hs:hover,.hs:active{
  border-color:rgba(255,255,0,0.8);
  background:rgba(255,255,0,0.15);
}
.hs.found{
  border-color:#4adf7a;
  background:rgba(74,223,122,0.3);
  pointer-events:none;
  animation:foundPop 0.4s cubic-bezier(.4,2,.4,1);
}
.hs.hint{
  animation:hintGlow 0.65s ease infinite;
}
.hs-check{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:clamp(16px,4cqw,26px);font-weight:900;color:#4adf7a;
  text-shadow:0 2px 8px rgba(0,0,0,1);pointer-events:none;opacity:0;
}
.hs.found .hs-check{opacity:1}
.pop{position:absolute;z-index:101;font-weight:900;pointer-events:none;
  white-space:nowrap;text-shadow:0 2px 8px rgba(0,0,0,0.9);
  animation:popUp 0.85s ease forwards}
.fly-coin{position:absolute;z-index:100;pointer-events:none;
  width:42px;height:42px;object-fit:contain;
  animation:coinFly 0.95s cubic-bezier(.4,2,.4,1) forwards}
.bottom{background:#0a1a0a;padding:12px 14px}
.go-btn{display:block;width:100%;padding:16px;border-radius:14px;border:none;
  background:#059669;color:#fff;font-size:19px;font-weight:700;cursor:pointer;
  font-family:inherit;box-shadow:0 5px 0 #047857;transition:transform 0.1s}
.go-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #047857}
.go-btn:disabled{background:#1a2a1a;color:#2a4a2a;box-shadow:none;cursor:not-allowed}

@keyframes foundPop{0%{transform:translate(-50%,-50%) scale(1)}40%{transform:translate(-50%,-50%) scale(1.4)}100%{transform:translate(-50%,-50%) scale(1)}}
@keyframes hintGlow{0%,100%{border-color:rgba(255,220,0,0.2);background:rgba(255,220,0,0.03)}50%{border-color:rgba(255,220,0,1);background:rgba(255,220,0,0.25)}}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-55px) scale(1.3)}}
@keyframes coinFly{0%{opacity:1;transform:scale(1) translate(0,0)}55%{opacity:1;transform:scale(1.6) translate(-12px,-70px)}100%{opacity:0;transform:scale(0.3) translate(-35px,-5px)}}
</style>
</head>

const GOAL=10;
let found=0,wallet=0,htimer=null,hel=null;

function build(){
  const img=document.getElementById('bgimg');
  const scene=document.getElementById('scene');
  function go(){
    const W=img.offsetWidth,H=img.offsetHeight;
    if(!W){setTimeout(go,40);return;}
    scene.querySelectorAll('.hs').forEach(e=>e.remove());
    HS.forEach(function(hs){
      const el=document.createElement('div');
      el.className='hs';el.id=hs.id;
      const rw=hs.rw/100*W, rh=hs.rh/100*H;
      el.style.cssText='left:'+hs.x+'%;top:'+hs.y+'%;width:'+(rw*2)+'px;height:'+(rh*2)+'px;';
      const chk=document.createElement('div');
      chk.className='hs-check';chk.textContent='✓';
      el.appendChild(chk);
      el.addEventListener('click',function(){tap(hs.id);});
      el.addEventListener('touchend',function(e){e.preventDefault();tap(hs.id);},{passive:false});
      scene.appendChild(el);
    });
    resetHint();
  }
  if(img.complete&&img.naturalWidth)go();else img.onload=go;
}

function tap(id){
  const el=document.getElementById(id);
  if(!el||el.classList.contains('found'))return;
  clearHint();
  el.classList.add('found');
  found++;
  document.getElementById('cnt').textContent=found;
  document.getElementById('pfill').style.width=(found/GOAL*100)+'%';
  document.getElementById('plbl').textContent=found+' / '+GOAL;
  floatFrom(el,'+1','#4adf7a',20);
  const inst=document.getElementById('instruct');
  if(found<GOAL){
    inst.textContent='יפה! עוד '+(GOAL-found)+' בקבוקים למצוא!';
    inst.style.background='#1a3a6a';inst.style.color='#fff';
  }else{
    inst.textContent='מצאת 10 בקבוקים! קיבלת 5 ש״ח!';
    inst.style.background='#0a3a0a';inst.style.color='#4adf7a';
    setTimeout(reward,900);
  }
  resetHint();
}

function reward(){
  const scene=document.getElementById('scene');
  const W=scene.offsetWidth,H=scene.offsetHeight;
  // Bin is at roughly 87% x, 72% y of the image
  const bx=W*0.87,by=H*0.72;
  const coin=document.createElement('img');
  coin.src=COIN_SRC;coin.className='fly-coin';
  coin.style.cssText='left:'+(bx-21)+'px;top:'+(by-21)+'px;';
  scene.appendChild(coin);
  setTimeout(function(){coin.remove();},1050);
  setTimeout(function(){
    floatXY(scene,bx-35,by-40,'+5 ש״ח!','#f5c842',26);
    floatXY(scene,bx-60,by-75,'כל הכבוד!','#4adf7a',20);
  },350);
  setTimeout(function(){
    wallet+=5;
    document.getElementById('wallet').textContent=wallet;
    document.getElementById('go-btn').disabled=false;
    document.getElementById('instruct').textContent=
      'מצוין! יש לך '+wallet+' ש״ח בארנק. אפשר ללכת לקנות!';
    document.getElementById('instruct').style.background='#1a3a1a';
  },800);
}

function floatFrom(el,txt,clr,sz){
  const scene=document.getElementById('scene');
  const sr=scene.getBoundingClientRect(),rr=el.getBoundingClientRect();
  floatXY(scene,rr.left-sr.left+rr.width/2-14,rr.top-sr.top-8,txt,clr,sz);
}
function floatXY(scene,x,y,txt,clr,sz){
  const d=document.createElement('div');
  d.className='pop';d.textContent=txt;
  d.style.cssText='left:'+x+'px;top:'+y+'px;color:'+clr+';font-size:'+sz+'px;';
  scene.appendChild(d);setTimeout(function(){d.remove();},950);
}

function resetHint(){
  clearHint();
  htimer=setTimeout(showHint,10000);
}
function clearHint(){
  if(htimer){clearTimeout(htimer);htimer=null;}
  if(hel){hel.classList.remove('hint');hel=null;}
}
function showHint(){
  const rem=HS.map(function(hs){return document.getElementById(hs.id);})
    .filter(function(el){return el&&!el.classList.contains('found');});
  if(!rem.length)return;
  const pick=rem[Math.floor(Math.random()*rem.length)];
  pick.classList.add('hint');hel=pick;
  htimer=setTimeout(function(){
    pick.classList.remove('hint');hel=null;resetHint();
  },3000);
}
