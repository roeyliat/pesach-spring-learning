<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק רצף הלימונדה</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 25% 15%, #FFFDE7 0%, #FFFBF0 55%, #FFF0CC 100%);
    font-family: 'Segoe UI', 'Arial Hebrew', Tahoma, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 16px;
    user-select: none;
    position: relative; overflow: hidden;
  }
  .bg-lemon {
    position: absolute; font-size: 72px; opacity: 0.055;
    pointer-events: none; z-index: 0;
  }
  .header { text-align: center; margin-bottom: 28px; z-index: 1; }
  .title-badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: #F5C518; border-radius: 999px;
    padding: 10px 28px; margin-bottom: 10px;
    box-shadow: 0 4px 18px rgba(215,160,10,0.35);
  }
  .title-badge span { font-size: 20px; font-weight: 800; color: #5C3A00; letter-spacing: -0.3px; }
  .subtitle { color: #9B8470; font-size: 14px; }
  .hand-area {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 14px; min-height: 168px; margin-bottom: 28px;
    padding: 16px 20px; z-index: 1;
    background: rgba(255,255,255,0.55);
    border: 2px dashed rgba(245,197,24,0.45);
    border-radius: 20px; width: 100%; max-width: 720px;
  }
  .hand-area.drag-over { background: rgba(245,197,24,0.1); border-color: #F5C518; }
  .card {
    width: 152px; border-radius: 16px; overflow: hidden;
    cursor: grab; transition: opacity 0.2s, transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.09);
    animation: cardIn 0.3s ease;
    flex-shrink: 0;
  }
  .card:hover {
    transform: scale(1.06) rotate(-1.5deg);
    box-shadow: 0 10px 28px rgba(0,0,0,0.14);
  }
  .card.dragging { opacity: 0.2; }
  .card img { width: 100%; height: 100px; object-fit: cover; display: block; pointer-events: none; }
  .card-label { padding: 8px 10px; text-align: center; }
  .card-label strong { display: block; font-weight: 700; font-size: 13px; color: #2C1A0E; line-height: 1.3; }
  .card-label small { font-size: 11px; color: #9B8470; }
  .arrow { font-size: 26px; color: #F5C518; margin-bottom: 22px; z-index: 1; }
  .slots-row {
    display: flex; gap: 14px; flex-wrap: wrap;
    justify-content: center; max-width: 720px; width: 100%; z-index: 1;
  }
  .slot {
    width: 152px; min-height: 162px; border-radius: 18px;
    position: relative; overflow: hidden;
    border: 2.5px dashed #D4B896;
    background: rgba(255,255,255,0.6);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }
  .slot.drag-over { background: rgba(245,197,24,0.12); border-color: #F5C518; border-style: solid; }
  .slot.shake { animation: shake 0.5s ease; }
  .slot.glow { animation: glowPulse 0.85s ease; }
  .slot.filled { animation: snapIn 0.38s cubic-bezier(0.34,1.56,0.64,1); cursor: grab; }
  .slot-badge {
    position: absolute; top: 0; left: 0; right: 0;
    background: #D4B896;
    color: #fff; font-size: 12px; font-weight: 700;
    padding: 4px 0; text-align: center; letter-spacing: 0.3px;
  }
  .slot-empty-icon { color: #D4B896; font-size: 36px; margin-top: 8px; }
  .slot img { width: 100%; height: 92px; object-fit: cover; display: block; margin-top: 30px; pointer-events: none; }
  .slot-card-label { padding: 6px 8px; text-align: center; }
  .slot-card-label strong { display: block; font-weight: 700; font-size: 12px; color: #2C1A0E; line-height: 1.3; }
  .slot-check { font-size: 18px; margin-top: 4px; }
  .reset-btn {
    margin-top: 28px; background: none;
    border: 1.5px solid #C8AD93; color: #9B8470;
    border-radius: 20px; padding: 7px 18px; cursor: pointer;
    font-size: 13px; z-index: 1; font-family: inherit;
    display: flex; align-items: center; gap: 6px;
  }
  .reset-btn:hover { background: rgba(200,173,147,0.1); }
  /* SUCCESS OVERLAY */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(255,251,240,0.93);
    backdrop-filter: blur(8px);
    animation: fadeIn 0.35s ease;
  }
  .overlay.show { display: flex; }
  .overlay .emoji { font-size: 68px; margin-bottom: 6px; animation: bounce 0.55s infinite alternate; }
  .overlay h2 { font-size: 30px; font-weight: 800; color: #5C3A00; margin-bottom: 6px; }
  .overlay p { color: #9B8470; font-size: 16px; margin-bottom: 32px; }
  .start-btn {
    background: linear-gradient(135deg, #F5C518, #D4A017);
    color: #5C3A00; font-weight: 800; font-size: 20px;
    padding: 16px 52px; border-radius: 999px;
    border: none; cursor: pointer; font-family: inherit;
    box-shadow: 0 6px 28px rgba(245,197,24,0.55);
    letter-spacing: 0.4px;
    transition: transform 0.1s;
  }
  .start-btn:hover { transform: scale(1.04); }
  .start-btn:active { transform: scale(0.97); }
  @keyframes shake {
    0%   { transform: translateX(0) }
    18%  { transform: translateX(-9px) }
    36%  { transform: translateX(9px) }
    54%  { transform: translateX(-6px) }
    72%  { transform: translateX(6px) }
    100% { transform: translateX(0) }
  }
  @keyframes snapIn {
    0%   { transform: scale(0.65) rotate(-5deg); opacity:0 }
    70%  { transform: scale(1.06) rotate(1deg) }
    100% { transform: scale(1) rotate(0); opacity:1 }
  }
  @keyframes glowPulse {
    0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.7) }
    60%  { box-shadow: 0 0 0 16px rgba(34,197,94,0) }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0) }
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(8px) scale(0.95) }
    to   { opacity:1; transform:translateY(0) scale(1) }
  }
  @keyframes bounce {
    from { transform: translateY(0) }
    to   { transform: translateY(-14px) }
  }
  @keyframes fadeIn {
    from { opacity:0 }
    to   { opacity:1 }
  }
</style>
</head>
<body>

<!-- bg lemons -->
<div class="bg-lemon" style="left:5%;top:8%;transform:rotate(18deg)">🍋</div>
<div class="bg-lemon" style="left:88%;top:12%;font-size:48px;transform:rotate(-14deg)">🍋</div>
<div class="bg-lemon" style="left:3%;top:72%;transform:rotate(30deg)">🍋</div>
<div class="bg-lemon" style="left:91%;top:68%;font-size:48px;transform:rotate(-8deg)">🍋</div>
<div class="bg-lemon" style="left:48%;top:4%;font-size:48px;transform:rotate(5deg)">🍋</div>

<!-- header -->
<div class="header">
  <div class="title-badge">
    <span style="font-size:26px">🍋</span>
    <span>סדרי את שלבי הלימונדה!</span>
    <span style="font-size:26px">🍋</span>
  </div>
  <p class="subtitle">גרור את הכרטיסים לסדר הנכון כדי לפתוח את המטבח</p>
</div>

<!-- hand area -->
<div class="hand-area" id="hand"
  ondragover="event.preventDefault(); this.classList.add('drag-over')"
  ondragleave="this.classList.remove('drag-over')"
  ondrop="dropOnHand(event)">
</div>

<div class="arrow">↓</div>

<!-- slots -->
<div class="slots-row" id="slots-row">
  <div class="slot" id="slot-0"
    ondragover="event.preventDefault(); this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="dropOnSlot(event,0)">
    <div class="slot-badge" id="badge-0">1️⃣ שלב 1</div>
    <div class="slot-empty-icon">○</div>
  </div>
  <div class="slot" id="slot-1"
    ondragover="event.preventDefault(); this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="dropOnSlot(event,1)">
    <div class="slot-badge" id="badge-1">2️⃣ שלב 2</div>
    <div class="slot-empty-icon">○</div>
  </div>
  <div class="slot" id="slot-2"
    ondragover="event.preventDefault(); this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="dropOnSlot(event,2)">
    <div class="slot-badge" id="badge-2">3️⃣ שלב 3</div>
    <div class="slot-empty-icon">○</div>
  </div>
  <div class="slot" id="slot-3"
    ondragover="event.preventDefault(); this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="dropOnSlot(event,3)">
    <div class="slot-badge" id="badge-3">4️⃣ שלב 4</div>
    <div class="slot-empty-icon">○</div>
  </div>
</div>

<button class="reset-btn" onclick="initGame()">↺ התחל מחדש</button>

<!-- success overlay -->
<div class="overlay" id="overlay">
  <div class="emoji">🎉</div>
  <h2>כל הכבוד!</h2>
  <p>הסדר נכון — המטבח פתוח!</p>
  <button class="start-btn" onclick="startGame()">🚀 התחלת המשחק!</button>
</div>

let hand = [];
let slots = [null,null,null,null];
let dragging = null; // {id, source}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function getStep(id) { return STEPS.find(s=>s.id===id); }

function makeCardEl(step) {
  const d = document.createElement('div');
  d.className = 'card';
  d.draggable = true;
  d.dataset.id = step.id;
  d.style.border = `2.5px solid ${step.border}`;
  d.style.background = step.bg;
  d.innerHTML = `
    <img src="${step.img}" alt="${step.text}">
    <div class="card-label">
      <strong>${step.text}</strong>
      <small>${step.sub}</small>
    </div>`;
  d.addEventListener('dragstart', e => {
    dragging = {id: step.id, source: 'hand'};
    setTimeout(()=>d.classList.add('dragging'),0);
  });
  d.addEventListener('dragend', () => d.classList.remove('dragging'));
  return d;
}

function renderHand() {
  const el = document.getElementById('hand');
  el.innerHTML = '';
  if(hand.length===0) {
    el.innerHTML = '<span style="color:#C8AD93;font-size:14px;margin:auto">כל הכרטיסים הוצבו ✓</span>';
    return;
  }
  hand.forEach(id => el.appendChild(makeCardEl(getStep(id))));
}

function renderSlot(i) {
  const slot = document.getElementById(`slot-${i}`);
  const badge = document.getElementById(`badge-${i}`);
  const emojis = ['1️⃣','2️⃣','3️⃣','4️⃣'];
  const labels = ['שלב 1','שלב 2','שלב 3','שלב 4'];
  const card = slots[i] ? getStep(slots[i]) : null;

  // remove old content except badge
  Array.from(slot.children).forEach(c => { if(c!==badge) c.remove(); });

  if(card) {
    slot.style.border = `2.5px solid ${card.border}`;
    slot.style.background = card.bg;
    badge.style.background = card.border;
    slot.classList.add('filled');
    setTimeout(()=>slot.classList.remove('filled'),400);

    const img = document.createElement('img');
    img.src = card.img; img.alt = card.text;
    const lbl = document.createElement('div');
    lbl.className = 'slot-card-label';
    lbl.innerHTML = `<strong>${card.text}</strong><div class="slot-check">✅</div>`;
    slot.appendChild(img);
    slot.appendChild(lbl);

    // allow dragging from slot
    slot.draggable = true;
    slot.ondragstart = e => {
      dragging = {id: card.id, source: `slot:${i}`};
    };
  } else {
    slot.style.border = '2.5px dashed #D4B896';
    slot.style.background = 'rgba(255,255,255,0.6)';
    badge.style.background = '#D4B896';
    slot.draggable = false;
    slot.ondragstart = null;
    const icon = document.createElement('div');
    icon.className = 'slot-empty-icon'; icon.textContent = '○';
    slot.appendChild(icon);
  }
}

function dropOnSlot(e, slotIdx) {
  e.preventDefault();
  document.getElementById(`slot-${slotIdx}`).classList.remove('drag-over');
  if(!dragging) return;
  const {id, source} = dragging;
  dragging = null;
  const step = getStep(id);

  if(step.correctSlot !== slotIdx) {
    const el = document.getElementById(`slot-${slotIdx}`);
    el.classList.add('shake');
    setTimeout(()=>el.classList.remove('shake'),550);
    return;
  }

  // free source slot if from a slot
  if(source.startsWith('slot:')) {
    const fromIdx = parseInt(source.split(':')[1]);
    slots[fromIdx] = null;
    renderSlot(fromIdx);
  } else {
    // remove from hand
    hand = hand.filter(x=>x!==id);
  }

  // if slot occupied, return that card to hand
  if(slots[slotIdx]) {
    hand.push(slots[slotIdx]);
  }

  slots[slotIdx] = id;
  renderSlot(slotIdx);
  renderHand();

  // glow
  const el = document.getElementById(`slot-${slotIdx}`);
  el.classList.add('glow');
  setTimeout(()=>el.classList.remove('glow'),900);

  // check done
  if(slots.every((s,i)=>s && getStep(s).correctSlot===i)) {
    setTimeout(()=>document.getElementById('overlay').classList.add('show'), 400);
  }
}

function dropOnHand(e) {
  e.preventDefault();
  document.getElementById('hand').classList.remove('drag-over');
  if(!dragging) return;
  const {id, source} = dragging;
  dragging = null;
  if(source.startsWith('slot:')) {
    const fromIdx = parseInt(source.split(':')[1]);
    slots[fromIdx] = null;
    renderSlot(fromIdx);
    if(!hand.includes(id)) hand.push(id);
    renderHand();
  }
}

function startGame() {
  // Hook: replace this with your game transition
  alert('המשחק מתחיל! (חבר כאן את לימון נינג׳ה)');
}

function initGame() {
  hand = shuffle(STEPS.map(s=>s.id));
  slots = [null,null,null,null];
  document.getElementById('overlay').classList.remove('show');
  renderHand();
  [0,1,2,3].forEach(renderSlot);
}

initGame();
</script>
