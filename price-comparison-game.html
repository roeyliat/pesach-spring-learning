<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Heebo','Segoe UI',Arial,sans-serif;direction:rtl}
body{background:#1a3a2a;min-height:100vh;padding-bottom:30px}
.game-wrap{max-width:560px;margin:0 auto;background:#fff;border-radius:0;overflow:hidden;min-height:100vh}
.top-bar{background:#1a3a6a;color:#fff;padding:14px 16px;text-align:center}
.top-title{font-size:22px;font-weight:900;margin-bottom:6px}
.top-sub{font-size:14px;opacity:0.85}
.score-bar{display:flex;justify-content:space-around;background:#0f2a4a;padding:10px;color:#aac8f0;font-size:14px;font-weight:600}
.score-val{color:#60aaff;font-size:20px;font-weight:900}
.shelf-bg{width:100%;height:130px;object-fit:cover;object-position:center 30%;border-bottom:3px solid #8a6030}
.shopping-list{background:#fffbf0;border:3px solid #d4a820;border-radius:12px;margin:12px;padding:12px}
.list-title{font-size:16px;font-weight:900;color:#7a4a00;margin-bottom:10px;text-align:center}
.list-items{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.list-item{background:#fff;border:2px solid #d4a820;border-radius:10px;padding:6px 14px;font-size:15px;font-weight:700;color:#5a3000;display:flex;align-items:center;gap:6px}
.list-item.done{background:#e8f5e8;border-color:#4a9a4a;color:#2a6a2a;text-decoration:line-through;opacity:0.7}
.list-item .checkmark{color:#4a9a4a;font-size:18px}
.stage-area{margin:0 12px;padding:14px;background:#f8f4ee;border-radius:14px;border:2px solid #d4b870}
.stage-label{font-size:17px;font-weight:900;color:#5a3000;text-align:center;margin-bottom:12px}
.products-grid{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.product-card{
  background:#fff;border-radius:16px;border:3px solid #d4b870;
  padding:10px;width:150px;cursor:pointer;
  transition:all 0.2s;outline:none;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.product-card:hover{transform:translateY(-4px);border-color:#a07030;box-shadow:0 6px 16px rgba(160,112,48,0.25)}
.product-card:active{transform:translateY(0) scale(0.97)}
.product-card.selected-correct{border-color:#2a8a2a;background:#e8f8e8;animation:correctPop 0.4s cubic-bezier(.4,2,.4,1)}
.product-card.selected-wrong{animation:wrongShake 0.4s ease}
.product-card.reveal-correct{border-color:#2a8a2a;border-width:4px;background:#e8f8e8}
.product-img{height:90px;object-fit:contain;border-radius:8px}
.product-name{font-size:13px;font-weight:700;color:#333;text-align:center;line-height:1.3;min-height:34px}
.price-tag{
  width:100%;background:#c8a020;border-radius:10px;border:3px solid #a07010;
  padding:8px;position:relative;
}
.price-inner{background:#e8c030;border-radius:6px;border:2px solid #c09020;padding:5px;text-align:center}
.price-num{font-size:22px;font-weight:900;color:#3a1a00}
.price-nis{font-size:11px;color:#5a3000;font-weight:700}
.tag-dot{width:7px;height:7px;background:#a07010;border-radius:50%;position:absolute;top:50%;right:-4px;transform:translateY(-50%)}
.tag-dot-l{left:-4px;right:auto}
.correct-badge{
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  background:#2a8a2a;color:#fff;border-radius:12px;
  padding:2px 10px;font-size:12px;font-weight:900;white-space:nowrap;
}
.winner-crown{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  font-size:22px;animation:crownBounce 0.5s cubic-bezier(.4,2,.4,1);
  display:block;
}
.feedback{
  text-align:center;padding:12px 16px;font-size:17px;font-weight:700;min-height:48px;
  border-radius:12px;margin:10px 12px;
}
.feedback-success{background:#e8f8e8;color:#1a6a1a;border:2px solid #4aaa4a}
.feedback-hint{background:#fff8e0;color:#7a4a00;border:2px solid #d4a820}
.feedback-empty{background:transparent;border:none;color:transparent}
.next-btn{
  display:block;width:calc(100%-24px);margin:8px 12px;
  background:#1a6a1a;color:#fff;border:none;border-radius:14px;
  padding:16px;font-size:20px;font-weight:900;cursor:pointer;font-family:inherit;
  transition:all 0.15s;box-shadow:0 5px 0 #0a4a0a;
}
.next-btn:hover{background:#227a22}
.next-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #0a4a0a}
.summary-screen{padding:20px;text-align:center}
.summary-title{font-size:26px;font-weight:900;color:#1a5a1a;margin-bottom:16px}
.savings-box{background:#e8f8e8;border:3px solid #4aaa4a;border-radius:16px;padding:20px;margin:16px 0}
.savings-amount{font-size:48px;font-weight:900;color:#1a8a1a}
.savings-label{font-size:16px;color:#2a5a2a;margin-top:4px}
.choice-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #d4e8d4;font-size:14px}
.choice-correct{color:#1a6a1a;font-weight:700}
.choice-missed{color:#cc4400;font-weight:700}
.new-round-btn{
  display:block;width:100%;margin-top:16px;
  background:#1a3a6a;color:#fff;border:none;border-radius:14px;
  padding:16px;font-size:20px;font-weight:900;cursor:pointer;font-family:inherit;
  transition:all 0.15s;
}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes crownBounce{0%{transform:translateX(-50%) scale(0) translateY(10px)}100%{transform:translateX(-50%) scale(1) translateY(0)}}
</style>
<script src="wallet.js"></script>
</head>

const CATALOG = {
  milk:    [{k:"milk_sara",n:"חלב סרה"},{k:"milk_tnuva",n:"חלב תנובה"},{k:"milk_yotvata",n:"חלב יוטבתה"}],
  dessert: [{k:"milky",n:"מילקי"},{k:"carlo",n:"קרלו"},{k:"mos",n:"מוס"}],
  cottage: [{k:"cottage_tnuva",n:"קוטג׳ תנובה"},{k:"cottage_sara",n:"קוטג׳ סרה"},{k:"cottage_shtr",n:"קוטג׳ שטראוס"}],
  hummus:  [{k:"hummus_achla",n:"חומוס אחלה"},{k:"tahini",n:"טחינה"},{k:"hummus_sabbar",n:"חומוס סבבר"}],
  cheese:  [{k:"cheese_prusa",n:"גבינה פרוסה"},{k:"cheese_galboa",n:"גלבוע"},{k:"cheese_yellow",n:"גבינה צהובה"}],
};
const CATEGORY_LABELS = {
  milk:"חלב", dessert:"מעדן שוקולד", cottage:"קוטג׳", hummus:"חומוס/טחינה", cheese:"גבינה צהובה"
};

const rnd=(a,b)=>parseFloat((a+Math.random()*(b-a)).toFixed(1));

function genRound(){
  const cats=Object.keys(CATALOG);
  const chosen=cats.sort(()=>Math.random()-0.5).slice(0,3);
  return chosen.map(cat=>{
    const items=[...CATALOG[cat]].sort(()=>Math.random()-0.5);
    const count=2+Math.floor(Math.random());  // 2 or 3 options
    const sel=items.slice(0,count);
    const prices=sel.map(()=>rnd(4,14));
    // Shuffle prices so cheapest isn't always first
    const cheapest=Math.min(...prices);
    return {cat,label:CATEGORY_LABELS[cat],items:sel,prices,cheapest,chosen:null};
  });
}

let G={rounds:[],stageIdx:0,score:0,roundNum:0,answered:false};

function startGame(){
  G.rounds=genRound();
  G.stageIdx=0;G.answered=false;
  renderGame();
}

function renderGame(){
  const app=document.getElementById("app");
  if(G.stageIdx>=G.rounds.length){renderSummary();return;}
  const stage=G.rounds[G.stageIdx];
  const allDone=G.rounds.map((r,i)=>({r,i}));

  app.innerHTML=`
    <div class="top-bar">
      <div class="top-title">🛒 הקונה החכם</div>
      <div class="top-sub">בחר את המוצר הזול ביותר לפי הרשימה!</div>
    </div>
    <div class="score-bar">
      <span>ניקוד: <span class="score-val" id="score">${G.score}</span></span>
      <span>💰 <span class="score-val" id="wallet-disp">${DW.get()}</span> ₪</span>
      <span>סבב: <span class="score-val">${G.roundNum+1}</span></span>
    </div>
    <img src="${IMGS.shelf}" class="shelf-bg" alt="מדף מכולת">
    <div class="shopping-list">
      <div class="list-title">📋 רשימת הקניות</div>
      <div class="list-items">
        ${G.rounds.map((r,i)=>`
          <div class="list-item${r.chosen!==null?' done':''}">
            ${r.chosen!==null?'<span class="checkmark">✓</span>':'🔹'}
            ${r.label}
          </div>`).join('')}
      </div>
    </div>
    <div style="margin:0 12px 8px;">\${DW.hint('לחץ על המוצר הכי זול!', '🏷️')}</div>
    <div class="stage-area">
      <div class="stage-label">${stage.label} — בחר את הכי זול!</div>
      <div class="products-grid" id="products">
        ${stage.items.map((item,i)=>`
          <div class="product-card" id="card-${i}" onclick="selectProduct(${i})" role="button" tabindex="0"
               onkeydown="if(event.key==='Enter')selectProduct(${i})">
            <img src="${IMGS[item.k]}" class="product-img" alt="${item.n}">
            <div class="product-name">${item.n}</div>
            <div class="price-tag" style="position:relative">
              <div class="tag-dot"></div><div class="tag-dot tag-dot-l"></div>
              <div class="price-inner">
                <div class="price-num">${stage.prices[i].toFixed(1)}</div>
                <div class="price-nis">₪ שקלים</div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>
    <div class="feedback feedback-empty" id="feedback"> </div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextStage()">
      ${G.stageIdx<G.rounds.length-1?'➡ מוצר הבא':'🏁 סיום וסיכום'}
    </button>
  `;
}

function selectProduct(i){
  if(G.answered)return;
  G.answered=true;
  const stage=G.rounds[G.stageIdx];
  const isCorrect=stage.prices[i]===stage.cheapest;
  const cheapestIdx=stage.prices.indexOf(stage.cheapest);
  stage.chosen=i;

  const fb=document.getElementById("feedback");
  const card=document.getElementById("card-"+i);

  if(isCorrect){
    G.score+=10;
    DW.add(2, 'קניה חכמה');
    document.getElementById("score").textContent=G.score;
    document.getElementById("wallet-disp") && (document.getElementById("wallet-disp").textContent=DW.get());
    DW.toast('💡 +2 ₪ — בחרת את הזול!', '#00e676');
    card.classList.add("selected-correct");
    card.innerHTML+=`<span class="winner-crown">👑</span><div class="correct-badge">הכי זול!</div>`;
    fb.className="feedback feedback-success";
    fb.textContent="מצוין! בחרת נכון! ✨ חסכת כסף חכם!";
  } else {
    card.classList.add("selected-wrong");
    const correctCard=document.getElementById("card-"+cheapestIdx);
    setTimeout(()=>{
      correctCard.classList.add("reveal-correct");
      correctCard.innerHTML+=`<div class="correct-badge">הכי זול!</div>`;
    },350);
    fb.className="feedback feedback-hint";
    fb.textContent=`כמעט! ${stage.items[cheapestIdx].n} הייתה הזולה ביותר 👆`;
  }

  document.getElementById("next-btn").style.display="block";
}

function nextStage(){
  G.stageIdx++;
  G.answered=false;
  if(G.stageIdx>=G.rounds.length){renderSummary();}
  else{renderGame();}
}

function renderSummary(){
  const app=document.getElementById("app");
  const correct=G.rounds.filter(r=>{
    if(r.chosen===null)return false;
    return r.prices[r.chosen]===r.cheapest;
  }).length;
  const savings=G.rounds.reduce((sum,r)=>{
    if(r.chosen===null)return sum;
    const paid=r.prices[r.chosen];
    const most=Math.max(...r.prices);
    return sum+parseFloat((most-paid).toFixed(1));
  },0);

  app.innerHTML=`
    <div class="top-bar">
      <div class="top-title">🎉 סיכום הקניות</div>
    </div>
    <div class="summary-screen">
      <div class="summary-title">${correct===G.rounds.length?'🌟 קניון מושלם!':correct>0?'👍 כל הכבוד!':'💪 נסה שוב!'}</div>
      <div class="savings-box">
        <div class="savings-amount">${savings.toFixed(1)} ₪</div>
        <div class="savings-label">חסכת בסבב זה!</div>
      </div>
      <div style="margin:16px 0">
        ${G.rounds.map(r=>{
          const isCorrect=r.chosen!==null&&r.prices[r.chosen]===r.cheapest;
          const cheapIdx=r.prices.indexOf(r.cheapest);
          return `<div class="choice-row">
            <span>${r.label}</span>
            <span class="${isCorrect?'choice-correct':'choice-missed'}">
              ${isCorrect?'✓ '+r.items[r.chosen!==null?r.chosen:cheapIdx].n:'✗ '+r.items[cheapIdx].n+' (הנכון)'}
            </span>
          </div>`;
        }).join('')}
      </div>
      <div style="font-size:22px;font-weight:900;color:#1a3a6a;margin:10px 0">
        ניקוד: ${G.score}
      </div>
      <button class="new-round-btn" onclick="newRound()">🔄 סבב קניות חדש</button>
    </div>
  `;
}

function newRound(){
  G.roundNum++;G.score=0;
  G.rounds=genRound();G.stageIdx=0;G.answered=false;
  renderGame();
}

DW.init({badge:false});
startGame();
</script>
</body>
</html>
